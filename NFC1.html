        function getDeckConfig(playerCount) {
            return {
                exploding: Math.max(1, playerCount - 1),
                defuse: playerCount + 2,
                attack: 4, skip: 4, favor: 4, shuffle: 4, future: 5, nope: 5, drawBottom: 4, reverse: 4, catCards: 4

        let firebaseApp = null, dbRef = null, isHost = false;

        function generateRoomCode() { return Math.random().toString(36).substring(2, 8).toUpperCase(); }
        function shuffleArray(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
        function log(msg) { const logDiv = document.getElementById('gameLog'); const entry = document.createElement('div'); entry.innerHTML = `<span class="text-yellow-400">[${new Date().toLocaleTimeString()}]</span> ${msg}`; logDiv.appendChild(entry); logDiv.scrollTop = logDiv.scrollHeight; }

            const dbUrl = document.getElementById('fbDbUrl').value.trim();

            dbRef = firebase.database().ref('bombCatRooms/' + game.roomId);
            const playerData = { id: game.playerId, name: name, handCount: 0, dead: false, isHost: true, ready: false };
            dbRef.set({ players: { [game.playerId]: playerData }, gameState: 'waiting', created: Date.now() });
            setupRoomListener(); updateUI(); log(`创建房间: ${game.roomId}`);
        }

        function joinRoom() {
            if (!initFirebase()) return;
            const code = prompt('请输入6位房间号:')?.toUpperCase().trim();
            if (!code || code.length !== 6) { alert('请输入正确的6位房间号!'); return; }
            const name = document.getElementById('playerName').value.trim() || '玩家' + Math.floor(Math.random()*1000);
            game.playerName = name; game.roomId = code; game.playerId = Date.now().toString();
            dbRef = firebase.database().ref('bombCatRooms/' + game.roomId);
            const playerData = { id: game.playerId, name: name, handCount: 0, dead: false, isHost: false, ready: false };
            dbRef.child('players/' + game.playerId).set(playerData);
            setupRoomListener(); updateUI(); log(`加入房间: ${game.roomId}`);
        }

        function setupRoomListener() {
            dbRef.on('value', (snapshot) => {
                const data = snapshot.val(); if (!data) return;
                if (data.players) { game.players = Object.values(data.players); updatePlayerList(); }
                if (data.gameData) { syncGameData(data.gameData); }
                document.getElementById('connStatus').textContent = '已连接';
                document.getElementById('connStatus').className = 'text-green-400';
                document.getElementById('roomCode').textContent = game.roomId;
                document.getElementById('playerCount').textContent = game.players.length;

                return `<span class="px-2 py-1 rounded ${isMe ? 'bg-yellow-600' : 'bg-blue-600'} text-xs">${p.name} ${status}</span>`;
            }).join('');
            if (isHost && game.players.length >= 2 && !game.gameStarted) {
                if (!document.getElementById('startBtn')) {
                    const btn = document.createElement('button'); btn.id = 'startBtn'; btn.textContent = '开始游戏';
                    btn.onclick = startGame; btn.className = 'mt-2 w-full bg-red-600 hover:bg-red-700 py-2 rounded font-bold';
                    list.appendChild(btn);

        function syncGameData(data) {
            game.deck = data.deck || []; game.discard = data.discard || [];
            game.currentPlayerIndex = data.currentPlayerIndex || 0; game.direction = data.direction || 1;
            game.attacksPending = data.attacksPending || 0; game.gameStarted = data.gameStarted || false;
            if (data.playerHands) {
                Object.keys(data.playerHands).forEach(pid => {
                    const p = game.players.find(x => x.id === pid); if (p) p.handCount = data.playerHands[pid].length;
                });
                if (data.playerHands[game.playerId]) game.myHand = data.playerHands[game.playerId];
            }
            if (game.gameStarted) {
                document.getElementById('lobbyPanel').classList.add('hidden');
                document.getElementById('gamePanel').classList.remove('hidden');
            }
            updateUI();
        }


--- 第3段结束 (108 行) ---function startGame() {
            if (!isHost) return; const playerCount = game.players.length;
            if (playerCount < 2) { alert('至少需要2名玩家!'); return; }
            const config = getDeckConfig(playerCount); let deck = [];
            for (let i = 0; i < config.attack; i++) deck.push(CARD_TYPES.ATTACK);
            for (let i = 0; i < config.skip; i++) deck.push(CARD_TYPES.SKIP);
            for (let i = 0; i < config.favor; i++) deck.push(CARD_TYPES.FAVOR);
            for (let i = 0; i < config.shuffle; i++) deck.push(CARD_TYPES.SHUFFLE);
            for (let i = 0; i < config.future; i++) deck.push(CARD_TYPES.FUTURE);
            for (let i = 0; i < config.nope; i++) deck.push(CARD_TYPES.NOPE);
            for (let i = 0; i < config.drawBottom; i++) deck.push(CARD_TYPES.DRAW_BOTTOM);
            for (let i = 0; i < config.reverse; i++) deck.push(CARD_TYPES.REVERSE);
            const cats = [CARD_TYPES.CAT_TACO, CARD_TYPES.CAT_WATERMELON, CARD_TYPES.CAT_POTATO, CARD_TYPES.CAT_BEARD, CARD_TYPES.CAT_RAINBOW];
            cats.forEach(cat => { for (let i = 0; i < config.catCards; i++) deck.push(cat); });
            deck = shuffleArray(deck);
            const playerHands = {};
            game.players.forEach((p) => {
                const hand = [];
                for (let i = 0; i < 7; i++) { if (deck.length > 0) hand.push(deck.pop()); }
                hand.push(CARD_TYPES.DEFUSE); playerHands[p.id] = hand;
            });
            const bombs = []; for (let i = 0; i < config.exploding; i++) bombs.push(CARD_TYPES.EXPLODING);
            bombs.forEach(bomb => { const pos = Math.floor(Math.random() * (deck.length + 1)); deck.splice(pos, 0, bomb); });
            const extraDefuses = config.defuse - playerCount;
            for (let i = 0; i < extraDefuses; i++) { const pos = Math.floor(Math.random() * (deck.length + 1)); deck.splice(pos, 0, CARD_TYPES.DEFUSE); }
            const gameData = { deck: deck, discard: [], playerHands: playerHands, currentPlayerIndex: 0, direction: 1, attacksPending: 0, gameStarted: true, turnCount: 1, lastAction: null };
            dbRef.child('gameData').set(gameData); dbRef.child('gameState').set('playing');
            game.myHand = playerHands[game.playerId] || []; game.gameStarted = true;
            document.getElementById('lobbyPanel').classList.add('hidden');
            document.getElementById('gamePanel').classList.remove('hidden');

        }

        function isMyTurn() { if (!game.players.length) return false; const currentPlayer = game.players[game.currentPlayerIndex]; return currentPlayer && currentPlayer.id === game.playerId && !currentPlayer.dead; }
        function getCurrentPlayer() { return game.players[game.currentPlayerIndex]; }
        function getNextPlayerIndex() { let idx = game.currentPlayerIndex; do { idx = (idx + game.direction + game.players.length) % game.players.length; } while (game.players[idx].dead); return idx; }

        function drawCard(fromBottom = false) {
            if (!isMyTurn()) { log('不是你的回合!'); return; }
            if (game.deck.length === 0) { log('牌堆已空!'); return; }
            let card; if (fromBottom) { card = game.deck.shift(); log('从牌堆底抽了一张牌...'); } else { card = game.deck.pop(); }
            if (card.id === 'EXP') { handleExplodingKitten(card); } else {

                if (game.attacksPending > 0) { game.attacksPending--; if (game.attacksPending > 0) { log(`攻击效果: 还需抽 ${game.attacksPending} 张牌`); setTimeout(() => drawCard(), 1000); return; } }

            else if (selected.length === 3 && selected[0].id === selected[1].id && selected[1].id === selected[2].id) { playThreeOfAKind(selected); return; }
            else if (selected.length === 5 && new Set(selected.map(c => c.id)).size === 5) { playFiveDifferent(selected); return; }
            if (selected.length === 1) { playSingleCard(selected[0]); } else { alert('无效组合!2张相同/3张相同/5张不同'); }
        }

        function playSingleCard(card) {
            const idx = game.myHand.indexOf(card); if (idx > -1) game.myHand.splice(idx, 1); game.discard.push(card); game.selectedCards = [];
            log(`打出 ${card.emoji} ${card.name}`);
            switch(card.id) {
                case 'ATK': game.attacksPending += 2; log('发起攻击!下家需连续抽2回合'); endTurn(true); break;
                case 'SKP': log('跳过抽牌'); if (game.attacksPending > 0) { game.attacksPending--; if (game.attacksPending > 0) { log(`攻击效果: 还需处理 ${game.attacksPending} 回合`); endTurn(); return; } } endTurn(true); break;
                case 'SHF': game.deck = shuffleArray(game.deck); log('重新洗牌!'); break;
                case 'FUT': viewFuture(); break;
                case 'FAV': playFavor(); break;
                case 'NOP': log('否决牌需要在其他玩家行动时使用'); game.discard.pop(); game.myHand.push(card); break;
                case 'BOT': drawCard(true); return;
                case 'REV': game.direction *= -1; log(`出牌顺序反转!当前为${game.direction === 1 ? '顺时针' : '逆时针'}`); endTurn(true); break;
                default: if (card.id.startsWith('C')) { log('猫咪牌需要组合使用(2/3/5张)'); game.discard.pop(); game.myHand.push(card); game.selectedCards = [game.myHand.length - 1]; updateUI(); return; }
            } saveHand(); saveGameData(); updateUI();
        }

        function playTwoOfAKind(cards) { const targetId = selectTargetPlayer('选择要偷牌的玩家:'); if (!targetId) return; removeCardsFromHand(cards); log(`使用2张${cards[0].name}偷取手牌!`); requestStealCard(targetId, 'random'); }
        function playThreeOfAKind(cards) { const targetId = selectTargetPlayer('选择要指定要牌的玩家:'); if (!targetId) return; const wantedCard = prompt('输入你想要的卡牌名称(如:攻击/拆解/跳过):'); if (!wantedCard) return; removeCardsFromHand(cards); log(`使用3张${cards[0].name}索要${wantedCard}!`); requestStealCard(targetId, wantedCard); }
        function playFiveDifferent(cards) { if (game.discard.length === 0) { alert('弃牌堆为空!'); return; } removeCardsFromHand(cards); viewDiscardPile(true); }
        function removeCardsFromHand(cards) { cards.forEach(card => { const idx = game.myHand.indexOf(card); if (idx > -1) { game.myHand.splice(idx, 1); game.discard.push(card); } }); game.selectedCards = []; saveHand(); saveGameData(); updateUI(); }
        function viewFuture() { if (game.deck.length === 0) { alert('牌堆为空!'); return; } const top3 = game.deck.slice(-3).reverse(); let msg = '🔮 牌堆顶的3张牌:
'; top3.forEach((card, i) => { msg += `${i+1}. ${card.emoji} ${card.name}
`; }); alert(msg); log('使用了预见未来'); }


--- 第4段结束 (110 行) ---function viewDiscardPile(canPick = false) { if (game.discard.length === 0) { alert('弃牌堆为空'); return; } const cards = game.discard.slice(-10); let html = '<div class="max-h-60 overflow-y-auto"><h3 class="mb-2">弃牌堆</h3><div class="grid grid-cols-5 gap-2">'; cards.forEach((card, idx) => { html += `<div class="p-2 ${card.color} rounded text-center" onclick="${canPick ? `pickFromDiscard(${idx})` : ''}">${card.emoji}</div>`; }); html += '</div></div>'; const modal = document.createElement('div'); modal.className = 'fixed inset-0 bg-black/80 flex items-center justify-center z-50'; modal.innerHTML = `<div class="bg-gray-800 p-4 rounded-xl max-w-md w-full mx-4">${html}<button onclick="this.parentElement.parentElement.remove()" class="mt-4 w-full bg-gray-600 py-2 rounded">关闭</button></div>`; document.body.appendChild(modal); }
        function pickFromDiscard(idx) { const card = game.discard.splice(game.discard.length - 1 - idx, 1)[0]; game.myHand.push(card); log(`从弃牌堆回收了 ${card.emoji} ${card.name}`); saveHand(); saveGameData(); updateUI(); document.querySelector('.fixed').remove(); }
        function playFavor() { const targetId = selectTargetPlayer('选择要索要手牌的玩家:'); if (!targetId) return; dbRef.child('requests/' + targetId).set({ type: 'favor', from: game.playerId, fromName: game.playerName, timestamp: Date.now() }); log(`向 ${game.players.find(p=>p.id===targetId)?.name} 索要手牌`); }
        function selectTargetPlayer(msg) { const alivePlayers = game.players.filter(p => !p.dead && p.id !== game.playerId); if (alivePlayers.length === 0) { alert('没有其他存活玩家!'); return null; } const choice = prompt(msg + '\n' + alivePlayers.map((p, i) => `${i+1}. ${p.name}`).join('\n') + '\n\n输入编号:'); const idx = parseInt(choice) - 1; if (idx >= 0 && idx < alivePlayers.length) return alivePlayers[idx].id; return null; }
        function requestStealCard(targetId, type) { dbRef.child('requests/' + targetId).set({ type: 'steal', stealType: type, from: game.playerId, fromName: game.playerName, timestamp: Date.now() }); }
        function endTurn(skipDraw = false) { if (!isMyTurn()) return; saveGameData(); game.currentPlayerIndex = getNextPlayerIndex(); game.turnCount++; const nextPlayer = game.players[game.currentPlayerIndex]; log(`回合结束，轮到 ${nextPlayer?.name || '未知'}`); saveGameData(); updateUI(); }
        function checkGameEnd() { const alivePlayers = game.players.filter(p => !p.dead); if (alivePlayers.length <= 1) { const winner = alivePlayers[0]; if (winner) { setTimeout(() => { alert(`🎉 游戏结束! 获胜者是: ${winner.name}`); log(`游戏结束!获胜者: ${winner.name}`); }, 500); } return true; } return false; }
        function saveHand() { if (!dbRef) return; dbRef.child('gameData/playerHands/' + game.playerId).set(game.myHand); const me = game.players.find(p => p.id === game.playerId); if (me) me.handCount = game.myHand.length; }
        function saveGameData() { if (!isHost || !dbRef) return; dbRef.child('gameData').update({ deck: game.deck, discard: game.discard, currentPlayerIndex: game.currentPlayerIndex, direction: game.direction, attacksPending: game.attacksPending, turnCount: game.turnCount }); }
        function savePlayerStatus() { if (!dbRef) return; dbRef.child('players/' + game.playerId).update({ dead: game.players.find(p => p.id === game.playerId)?.dead, handCount: game.myHand.length }); }
        function openNFCModal() { document.getElementById('nfcModal').classList.remove('hidden'); document.getElementById('nfcResult').classList.add('hidden'); if ('NDEFReader' in window) { startRealNFC(); } }
        function closeNFCModal() { document.getElementById('nfcModal').classList.add('hidden'); }
        async function startRealNFC() { try { const ndef = new NDEFReader(); await ndef.scan(); ndef.addEventListener("reading", ({ serialNumber }) => { handleNFCDetection(serialNumber); }); } catch (error) { console.log('NFC error:', error); } }
        function startNFCSimulation() { const allCards = Object.values(CARD_TYPES).filter(c => c.id !== 'EXP'); const randomCard = allCards[Math.floor(Math.random() * allCards.length)]; const resultDiv = document.getElementById('nfcResult'); resultDiv.classList.remove('hidden'); resultDiv.innerHTML = `扫描成功!<br>${randomCard.emoji} <b>${randomCard.name}</b>`; if (isMyTurn()) { setTimeout(() => { if (confirm(`要将 ${randomCard.name} 加入手牌吗?`)) { game.myHand.push(randomCard); saveHand(); updateUI(); log(`NFC扫描获得: ${randomCard.emoji} ${randomCard.name}`); } closeNFCModal(); }, 1000); } else { setTimeout(closeNFCModal, 2000); } }
        function handleNFCDetection(cardId) { const cardMap = JSON.parse(localStorage.getItem('nfcCardMap') || '{}'); const cardType = cardMap[cardId]; if (cardType && CARD_TYPES[cardType]) { const card = CARD_TYPES[cardType]; document.getElementById('nfcResult').innerHTML = `识别到: ${card.emoji} ${card.name}`; document.getElementById('nfcResult').classList.remove('hidden'); if (isMyTurn() && confirm(`使用 ${card.name}?`)) { const handIdx = game.myHand.findIndex(c => c.id === card.id); if (handIdx > -1) { game.selectedCards = [handIdx]; playSelectedCards(); } else { game.myHand.push(card); saveHand(); updateUI(); } } } else { const bind = confirm(`未识别的NFC标签: ${cardId}\n要绑定为某种卡牌吗?`); if (bind) { const type = prompt('输入卡牌类型(如:ATTACK/SKIP/DEFUSE等):'); if (type && CARD_TYPES[type]) { cardMap[cardId] = type; localStorage.setItem('nfcCardMap', JSON.stringify(cardMap)); alert(`已绑定为: ${CARD_TYPES[type].name}`); } } } }
        function updateUI() {
            if (!game.gameStarted) return;
            const playersBar = document.getElementById('playersBar');
            playersBar.innerHTML = game.players.map((p, idx) => {
                const isCurrent = idx === game.currentPlayerIndex; const isMe = p.id === game.playerId; const status = p.dead ? '💀' : (isCurrent ? '➡️' : '');
                return `<div class="player-avatar ${isCurrent ? 'active' : ''} ${p.dead ? 'dead' : ''} bg-white/10 rounded-lg p-2 text-center min-w-[80px]"><div class="text-2xl">${isMe ? '😺' : '🐱'}</div><div class="text-xs ${isMe ? 'text-yellow-300 font-bold' : ''}">${p.name} ${status}</div><div class="text-xs text-gray-400">${p.handCount}张</div></div>`;
            }).join('');
            document.getElementById('deckCount').textContent = game.deck.length; document.getElementById('discardCount').textContent = game.discard.length;
            const topDiscard = game.discard[game.discard.length - 1]; document.getElementById('topDiscard').textContent = topDiscard ? topDiscard.emoji : '🗑️';
            if (topDiscard) document.getElementById('discardPile').className = `w-32 h-44 mx-auto ${topDiscard.color} rounded-xl border-4 border-white/30 flex items-center justify-center text-4xl relative overflow-hidden`;
            const currentPlayer = getCurrentPlayer();
            if (currentPlayer) {
                const myTurn = currentPlayer.id === game.playerId;
                document.getElementById('turnIndicator').innerHTML = `回合 ${game.turnCount}: <span class="${myTurn ? 'text-green-400' : 'text-white'}">${currentPlayer.name}</span> ${myTurn ? '(你的回合)' : ''}`;
                const actionBtns = document.getElementById('actionButtons');
                if (myTurn && !currentPlayer.dead) { actionBtns.classList.remove('hidden'); document.getElementById('btnEndTurn').classList.remove('hidden'); document.getElementById('btnPlay').classList.toggle('hidden', game.selectedCards.length === 0); }
                else { actionBtns.classList.add('hidden'); }
            } updateHandDisplay();
        }
        function updateHandDisplay() { const handArea = document.getElementById('handArea'); document.getElementById('handCount').textContent = game.myHand.length; handArea.innerHTML = game.myHand.map((card, idx) => { const isSelected = game.selectedCards.includes(idx); return `<div onclick="toggleCardSelection(${idx})" class="hand-card ${card.color} ${isSelected ? 'selected' : ''} w-20 h-28 rounded-lg border-2 border-white/50 flex flex-col items-center justify-center p-1 select-none"><div class="text-2xl mb-1">${card.emoji}</div><div class="text-xs text-center">${card.name}</div></div>`; }).join(''); }
        function toggleCardSelection(idx) { if (!isMyTurn()) return; const pos = game.selectedCards.indexOf(idx); if (pos > -1) game.selectedCards.splice(pos, 1); else game.selectedCards.push(idx); updateHandDisplay(); updateUI(); }
        function setupRequestListener() { if (!dbRef || !game.playerId) return; dbRef.child('requests/' + game.playerId).on('value', (snapshot) => { const req = snapshot.val(); if (!req) return; if (req.type === 'favor') handleFavorRequest(req); else if (req.type === 'steal') handleStealRequest(req); snapshot.ref.remove(); }); }
        function handleFavorRequest(req) { if (game.myHand.length === 0) { log(`${req.fromName} 向你索要手牌，但你没有手牌`); return; } const cardNames = game.myHand.map((c, i) => `${i+1}. ${c.emoji}${c.name}`).join('\n'); const choice = prompt(`${req.fromName} 向你索要一张手牌，选择给哪张:\n${cardNames}\n\n输入编号:`); const idx = parseInt(choice) - 1; if (idx >= 0 && idx < game.myHand.length) { const card = game.myHand.splice(idx, 1)[0]; dbRef.child('transfers/' + req.from).push({ card: card, from: game.playerId, timestamp: Date.now() }); log(`给了 ${req.fromName} 一张 ${card.name}`); saveHand(); updateUI(); } }
        function handleStealRequest(req) { if (game.myHand.length === 0) return; let stolenCard; if (req.stealType === 'random') { const idx = Math.floor(Math.random() * game.myHand.length); stolenCard = game.myHand.splice(idx, 1)[0]; } else { const targetType = Object.values(CARD_TYPES).find(c => c.name.includes(req.stealType)); if (targetType) { const idx = game.myHand.findIndex(c => c.id === targetType.id); if (idx > -1) stolenCard = game.myHand.splice(idx, 1)[0]; else { const idx = Math.floor(Math.random() * game.myHand.length); stolenCard = game.myHand.splice(idx, 1)[0]; } } } if (stolenCard) { dbRef.child('transfers/' + req.from).push({ card: stolenCard, from: game.playerId, timestamp: Date.now() }); log(`${req.f        if (stolenCard) { dbRef.child('transfers/' + req.from).push({ card: stolenCard, from: game.playerId, timestamp: Date.now() }); log(`${req.fromName} 偷走了你的 ${stolenCard.name}!`); saveHand(); updateUI(); } }
        function setupTransferListener() { if (!dbRef || !game.playerId) return; dbRef.child('transfers/' + game.playerId).on('child_added', (snapshot) => { const transfer = snapshot.val(); if (transfer && transfer.card) { game.myHand.push(transfer.card); log(`收到来自 ${game.players.find(p=>p.id===transfer.from)?.name || '未知'} 的牌: ${transfer.card.emoji} ${transfer.card.name}`); saveHand(); updateUI(); } snapshot.ref.remove(); }); }
        setTimeout(() => { setupRequestListener(); setupTransferListener(); }, 2000);
