<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesero - Panel de Cobro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        .order-card { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-cooking { background: #dbeafe; color: #1e40af; }
        .status-ready { background: #d1fae5; color: #065f46; }
        .status-done { background: #f3f4f6; color: #374151; }
        .payment-paid { background: #10b981; color: white; }
        .payment-unpaid { background: #ef4444; color: white; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="max-w-4xl mx-auto p-4">
        <header class="bg-blue-600 text-white p-4 rounded-lg shadow mb-4">
            <h1 class="text-2xl font-bold">🍽️ Panel de Mesero - Cobros</h1>
            <p class="text-sm mt-1">Hoy: <span id="currentDate"></span></p>
            <div class="mt-2 flex gap-2">
                <button onclick="showSection('today')" class="bg-white text-blue-600 px-3 py-1 rounded text-sm font-bold">Pedidos Hoy</button>
                <button onclick="showSection('history')" class="bg-blue-700 text-white px-3 py-1 rounded text-sm">Historial</button>
            </div>
        </header>
        
        <div id="todaySection">
            <div class="bg-white p-4 rounded-lg shadow mb-4">
                <h2 class="text-lg font-bold mb-2">📊 Resumen del Día</h2>
                <div class="grid grid-cols-3 gap-2 text-center">
                    <div class="bg-blue-50 p-2 rounded">
                        <div class="text-2xl font-bold text-blue-600" id="totalOrders">0</div>
                        <div class="text-xs">Total Pedidos</div>
                    </div>
                    <div class="bg-green-50 p-2 rounded">
                        <div class="text-2xl font-bold text-green-600" id="totalRevenue">$0</div>
                        <div class="text-xs">Ingresos</div>
                    </div>
                    <div class="bg-yellow-50 p-2 rounded">
                        <div class="text-2xl font-bold text-yellow-600" id="pendingPayment">0</div>
                        <div class="text-xs">Por Cobrar</div>
                    </div>
                </div>
            </div>
            <div id="ordersList" class="space-y-3">
                <div class="text-center text-gray-500 py-8">Cargando pedidos...</div>
            </div>
        </div>

        <div id="historySection" class="hidden">
            <div class="bg-white p-4 rounded-lg shadow mb-4">
                <h3 class="font-bold mb-2">Buscar Historial</h3>
                <input type="date" id="historyDate" class="w-full p-2 border rounded mb-2">
                <button onclick="loadHistory()" class="w-full bg-blue-600 text-white py-2 rounded">Buscar</button>
            </div>
            <div id="historyList" class="space-y-3"></div>
        </div>
    </div>

    <script>
        // Firebase配置 - 确保和customer/kitchen一样
        const firebaseConfig = {
            apiKey: "AIzaSyD...", // 用你的实际配置
            authDomain: "restaurante-tocopilla.firebaseapp.com",
            databaseURL: "https://restaurante-tocopilla-default-rtdb.firebaseio.com",
            projectId: "restaurante-tocopilla",
            storageBucket: "restaurante-tocopilla.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef123456"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // 获取智利时区日期 (YYYY-MM-DD)
        function getChileDate() {
            const now = new Date();
            const chileTime = new Date(now.toLocaleString("en-US", {timeZone: "America/Santiago"}));
            const year = chileTime.getFullYear();
            const month = String(chileTime.getMonth() + 1).padStart(2, '0');
            const day = String(chileTime.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
        
        document.getElementById('currentDate').textContent = getChileDate();
        document.getElementById('historyDate').value = getChileDate();
        let todayOrders = {};
        
        // 🔥 关键修复：监听所有订单，然后在客户端筛选今日订单
        function listenToOrders() {
            const today = getChileDate();
            
            // 使用on('value')监听整个orders节点
            db.ref('orders').on('value', (snapshot) => {
                const allOrders = snapshot.val() || {};
                todayOrders = {};
                
                // 筛选今日订单（按date字段）
                Object.keys(allOrders).forEach(orderId => {
                    const order = allOrders[orderId];
                    if (order && order.date === today) {
                        todayOrders[orderId] = order;
                    }
                });
                
                renderOrders(todayOrders);
                updateSummary(todayOrders);
            }, (error) => {
                console.error("Error loading orders:", error);
                document.getElementById('ordersList').innerHTML = 
                    `<div class="text-red-500 text-center py-4">Error: ${error.message}</div>`;
            });
        }
        
        function renderOrders(orders) {
            const container = document.getElementById('ordersList');
            
            if (Object.keys(orders).length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-8">No hay pedidos hoy</div>';
                return;
            }
            
            // 按时间戳倒序排列（最新的在前面）
            const sortedIds = Object.keys(orders).sort((a, b) => {
                return (orders[b].timestamp || 0) - (orders[a].timestamp || 0);
            });
            
            container.innerHTML = sortedIds.map(id => {
                const order = orders[id];
                const statusClass = {
                    'pending': 'status-pending',
                    'cooking': 'status-cooking', 
                    'ready': 'status-ready',
                    'done': 'status-done'
                }[order.status] || 'status-pending';
                
                const isPaid = order.paymentStatus === 'paid';
                const paymentClass = isPaid ? 'payment-paid' : 'payment-unpaid';
                const paymentText = isPaid ? '✓ Pagado' : '⚠ Por Pagar';
                
                return `
                <div class="order-card bg-white rounded-lg shadow p-4 border-l-4 ${isPaid ? 'border-green-500' : 'border-red-500'}">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="text-xs text-gray-500">#${id.slice(-6)}</span>
                            <span class="ml-2 px-2 py-1 rounded text-xs font-bold ${statusClass}">
                                ${order.status || 'pending'}
                            </span>
                        </div>
                        <span class="text-lg font-bold text-gray-800">$${order.total || 0}</span>
                    </div>
                    
                    <div class="space-y-1 mb-3 text-sm">
                        ${(order.items || []).map(item => `
                            <div class="flex justify-between">
                                <span>${item.quantity}x ${item.name}</span>
                                <span class="text-gray-600">$${item.price * item.quantity}</span>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="flex justify-between items-center pt-2 border-t">
                        <span class="text-xs text-gray-500">${new Date(order.timestamp).toLocaleTimeString('es-CL')}</span>
                        <span class="px-2 py-1 rounded text-xs font-bold ${paymentClass}">${paymentText}</span>
                    </div>
                    
                    ${!isPaid ? `
                    <div class="mt-3 grid grid-cols-3 gap-2">
                        <button onclick="processPayment('${id}', 'cash')" class="bg-green-600 text-white py-2 rounded text-sm hover:bg-green-700">
                            💵 Efectivo
                        </button>
                        <button onclick="processPayment('${id}', 'card')" class="bg-blue-600 text-white py-2 rounded text-sm hover:bg-blue-700">
                            💳 Tarjeta
                        </button>
                        <button onclick="processPayment('${id}', 'transfer')" class="bg-purple-600 text-white py-2 rounded text-sm hover:bg-purple-700">
                            📱 Transferencia
                        </button>
                    </div>
                    ` : `
                    <div class="mt-2 text-xs text-green-600 font-bold text-center">
                        ✓ Pagado con: ${order.paymentMethod || 'desconocido'}
                    </div>
                    `}
                </div>
                `;
            }).join('');
        }
        function updateSummary(orders) {
            const totalOrders = Object.keys(orders).length;
            let revenue = 0;
            let pending = 0;
            
            Object.values(orders).forEach(order => {
                if (order.paymentStatus === 'paid') {
                    revenue += order.total || 0;
                } else {
                    pending += order.total || 0;
                }
            });
            
            document.getElementById('totalOrders').textContent = totalOrders;
            document.getElementById('totalRevenue').textContent = '$' + revenue.toLocaleString('es-CL');
            document.getElementById('pendingPayment').textContent = '$' + pending.toLocaleString('es-CL');
        }
        
        // 处理支付
        function processPayment(orderId, method) {
            const methodNames = {
                'cash': 'Efectivo',
                'card': 'Tarjeta', 
                'transfer': 'Transferencia'
            };
            
            if (!confirm(`¿Confirmar pago con ${methodNames[method]}?`)) return;
            
            db.ref('orders/' + orderId).update({
                paymentStatus: 'paid',
                paymentMethod: methodNames[method],
                paidAt: Date.now()
            }).then(() => {
                alert('✓ Pago registrado correctamente');
            }).catch(err => {
                alert('Error: ' + err.message);
            });
        }
        
        // 切换视图
        function showSection(section) {
            if (section === 'today') {
                document.getElementById('todaySection').classList.remove('hidden');
                document.getElementById('historySection').classList.add('hidden');
            } else {
                document.getElementById('todaySection').classList.add('hidden');
                document.getElementById('historySection').classList.remove('hidden');
            }
        }
        
        // 加载历史记录
        function loadHistory() {
            const date = document.getElementById('historyDate').value;
            const container = document.getElementById('historyList');
            container.innerHTML = '<div class="text-center py-4">Cargando...</div>';
            
            db.ref('orders').once('value', (snapshot) => {
                const allOrders = snapshot.val() || {};
                const filtered = {};
                
                Object.keys(allOrders).forEach(id => {
                    if (allOrders[id].date === date) {
                        filtered[id] = allOrders[id];
                    }
                });
                
                if (Object.keys(filtered).length === 0) {
                    container.innerHTML = '<div class="text-center text-gray-400 py-4">No hay pedidos para esta fecha</div>';
                    return;
                }
                
                // 计算当日总收入
                let dayRevenue = 0;
                Object.values(filtered).forEach(o => {
                    if (o.paymentStatus === 'paid') dayRevenue += o.total || 0;
                });
                
                container.innerHTML = `
                    <div class="bg-blue-100 p-3 rounded mb-3 text-center font-bold">
                        Total ingresos ${date}: $${dayRevenue.toLocaleString('es-CL')}
                    </div>
                ` + Object.keys(filtered).sort((a,b) => filtered[b].timestamp - filtered[a].timestamp).map(id => {
                    const o = filtered[id];
                    return `
                    <div class="bg-white p-3 rounded shadow mb-2 text-sm">
                        <div class="flex justify-between">
                            <span>#${id.slice(-6)}</span>
                            <span class="${o.paymentStatus==='paid'?'text-green-600':'text-red-600'} font-bold">
                                ${o.paymentStatus==='paid'?'✓':'⚠'} $${o.total}
                            </span>
                        </div>
                        <div class="text-gray-500 text-xs mt-1">
                            ${o.paymentStatus==='paid' ? `Pagado: ${o.paymentMethod}` : 'Pendiente de pago'}
                        </div>
                    </div>`;
                }).join('');
            });
        }
        
        // 启动监听
        listenToOrders();
    </script>
</body>
</html>
