<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mesero - Cobros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        .order-card { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .debug-box { background: #f0f0f0; border: 1px solid #ccc; padding: 10px; margin: 10px 0; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div class="max-w-4xl mx-auto">
        <header class="bg-blue-600 text-white p-4 rounded-lg shadow mb-4">
            <h1 class="text-2xl font-bold">🍽️ Panel de Mesero</h1>
            <p class="text-sm mt-1">Fecha Chile: <span id="currentDate"></span> | Moneda: CLP</p>
            <div class="mt-2 flex gap-2">
                <button onclick="showSection('today')" class="bg-white text-blue-600 px-3 py-1 rounded text-sm font-bold">Pedidos Hoy</button>
                <button onclick="showSection('history')" class="bg-blue-700 text-white px-3 py-1 rounded text-sm">Historial</button>
            </div>
        </header>
        
        <!-- 调试信息（出问题时看这里） -->
        <div id="debugInfo" class="debug-box hidden">
            <strong>Estado de conexión:</strong> <span id="connStatus">Conectando...</span><br>
            <strong>Total en DB:</strong> <span id="totalInDB">0</span> pedidos<br>
            <strong>Fecha hoy:</strong> <span id="todayDate"></span><br>
            <strong>Errores:</strong> <span id="errorMsg" class="text-red-600">Ninguno</span>
        </div>
        <button onclick="toggleDebug()" class="text-xs text-gray-500 mb-2 underline">Mostrar/Ocultar Debug</button>
        
        <div id="todaySection">
            <div class="bg-white p-4 rounded-lg shadow mb-4">
                <h2 class="text-lg font-bold mb-2">📊 Resumen del Día (CLP)</h2>
                <div class="grid grid-cols-3 gap-2 text-center">
                    <div class="bg-blue-50 p-2 rounded">
                        <div class="text-2xl font-bold text-blue-600" id="totalOrders">0</div>
                        <div class="text-xs">Total Pedidos</div>
                    </div>
                    <div class="bg-green-50 p-2 rounded">
                        <div class="text-2xl font-bold text-green-600" id="totalRevenue">0</div>
                        <div class="text-xs">Ingresos</div>
                    </div>
                    <div class="bg-yellow-50 p-2 rounded">
                        <div class="text-2xl font-bold text-yellow-600" id="pendingPayment">0</div>
                        <div class="text-xs">Por Cobrar</div>
                    </div>
                </div>
            </div>
            
            <div id="ordersList" class="space-y-3">
                <div class="text-center text-gray-500 py-8">Cargando pedidos...</div>
            </div>
        </div>

        <div id="historySection" class="hidden">
            <div class="bg-white p-4 rounded-lg shadow mb-4">
                <h3 class="font-bold mb-2">Buscar Historial</h3>
                <input type="date" id="historyDate" class="w-full p-2 border rounded mb-2">
                <button onclick="loadHistory()" class="w-full bg-blue-600 text-white py-2 rounded font-bold">Buscar</button>
            </div>
            <div id="historyStats" class="hidden bg-green-100 p-3 rounded mb-3 text-center font-bold text-green-800"></div>
            <div id="historyList" class="space-y-3"></div>
        </div>
    </div>

    <script>
        // 智利数字格式
        function formatCLP(amount) {
            if (!amount || isNaN(amount)) return '0';
            const num = Math.round(parseFloat(amount));
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        // 🔥 Firebase配置 - 确保databaseURL正确
        const firebaseConfig = {
            databaseURL: "https://restaurante-tocopilla-default-rtdb.firebaseio.com"
        };
        
        try {
            firebase.initializeApp(firebaseConfig);
            console.log("Firebase inicializado correctamente");
        } catch (e) {
            console.error("Error Firebase:", e);
            document.getElementById('errorMsg').textContent = "Error Firebase: " + e.message;
        }
        
        const db = firebase.database();
        
        // 获取智利日期（YYYY-MM-DD）
        function getChileDate() {
            const now = new Date();
            const chileTime = new Date(now.toLocaleString("en-US", {timeZone: "America/Santiago"}));
            const year = chileTime.getFullYear();
            const month = String(chileTime.getMonth() + 1).padStart(2, '0');
            const day = String(chileTime.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
        
        const today = getChileDate();
        document.getElementById('currentDate').textContent = today;
        document.getElementById('todayDate').textContent = today;
        document.getElementById('historyDate').value = today;
        
        let todayOrders = {};
        
        function toggleDebug() {
            document.getElementById('debugInfo').classList.toggle('hidden');
        }
        // 🔥 关键修复：监听所有订单，客户端筛选今日
        function listenToOrders() {
            console.log("Iniciando escucha de pedidos...");
            document.getElementById('connStatus').textContent = "Escuchando...";
            
            const ordersRef = db.ref('orders');
            
            ordersRef.on('value', (snapshot) => {
                console.log("Datos recibidos de Firebase");
                document.getElementById('connStatus').textContent = "Conectado ✓";
                
                const allOrders = snapshot.val();
                
                // 调试信息
                if (!allOrders) {
                    console.log("No hay datos en la DB");
                    document.getElementById('totalInDB').textContent = "0";
                    document.getElementById('ordersList').innerHTML = '<div class="text-center text-gray-500 py-8">No hay pedidos en la base de datos</div>';
                    updateSummary({});
                    return;
                }
                
                const allKeys = Object.keys(allOrders);
                document.getElementById('totalInDB').textContent = allKeys.length;
                console.log("Total pedidos en DB:", allKeys.length);
                
                // 筛选今日订单
                todayOrders = {};
                let matchCount = 0;
                
                allKeys.forEach(orderId => {
                    const order = allOrders[orderId];
                    // 调试：打印第一个订单的日期看看格式
                    if (matchCount === 0) {
                        console.log("Ejemplo de pedido:", orderId, "fecha:", order?.date);
                    }
                    
                    if (order && order.date === today) {
                        todayOrders[orderId] = order;
                        matchCount++;
                    }
                });
                
                console.log("Pedidos de hoy:", matchCount);
                
                if (matchCount === 0) {
                    document.getElementById('ordersList').innerHTML = 
                        `<div class="text-center text-gray-500 py-8">
                            No hay pedidos para hoy (${today})<br>
                            <span class="text-xs text-gray-400">Total en sistema: ${allKeys.length} pedidos</span>
                        </div>`;
                } else {
                    renderOrders(todayOrders);
                }
                
                updateSummary(todayOrders);
                
            }, (error) => {
                console.error("Error de Firebase:", error);
                document.getElementById('connStatus').textContent = "Error ✗";
                document.getElementById('errorMsg').textContent = error.message;
                document.getElementById('ordersList').innerHTML = 
                    `<div class="text-red-500 text-center py-4">
                        Error de conexión: ${error.message}<br>
                        <button onclick="location.reload()" class="mt-2 bg-blue-500 text-white px-4 py-2 rounded">Recargar</button>
                    </div>`;
            });
        }
        
        function renderOrders(orders) {
            const container = document.getElementById('ordersList');
            const sortedIds = Object.keys(orders).sort((a, b) => {
                return (orders[b].timestamp || 0) - (orders[a].timestamp || 0);
            });
            
            container.innerHTML = sortedIds.map(id => {
                const order = orders[id];
                const isPaid = order.paymentStatus === 'paid';
                
                return `
                <div class="order-card bg-white rounded-lg shadow p-4 border-l-4 ${isPaid ? 'border-green-500' : 'border-red-500'}">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="text-xs text-gray-500 font-mono">#${id.slice(-6)}</span>
                            <span class="ml-2 px-2 py-1 rounded text-xs font-bold ${order.status === 'pending' ? 'bg-yellow-100 text-yellow-800' : order.status === 'cooking' ? 'bg-blue-100 text-blue-800' : order.status === 'ready' ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'}">
                                ${order.status === 'pending' ? 'PENDIENTE' : order.status === 'cooking' ? 'COCINANDO' : order.status === 'ready' ? 'LISTO' : 'ENTREGADO'}
                            </span>
                        </div>
                        <span class="text-2xl font-bold text-gray-800">${formatCLP(order.total)}</span>
                    </div>
                    
                    <div class="space-y-1 mb-3 bg-gray-50 p-2 rounded text-sm">
                        ${(order.items || []).map(item => {
                            const subtotal = item.price * item.quantity;
                            return `
                                <div class="flex justify-between">
                                    <span>${item.quantity}x ${item.name}</span>
                                    <span class="text-gray-600 font-mono">${formatCLP(subtotal)}</span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                    
                    <div class="flex justify-between items-center pt-2 border-t">
                        <span class="text-xs text-gray-500">${new Date(order.timestamp).toLocaleTimeString('es-CL', {hour: '2-digit', minute:'2-digit'})}</span>
                        <span class="px-2 py-1 rounded text-xs font-bold ${isPaid ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}">
                            ${isPaid ? '✓ PAGADO' : '⚠ POR COBRAR'}
                        </span>
                    </div>
                    
                    ${!isPaid ? `
                    <div class="mt-3 grid grid-cols-3 gap-2">
                        <button onclick="processPayment('${id}', 'cash')" class="bg-green-600 text-white py-2 rounded text-sm font-bold hover:bg-green-700">💵 Efectivo</button>
                        <button onclick="processPayment('${id}', 'card')" class="bg-blue-600 text-white py-2 rounded text-sm font-bold hover:bg-blue-700">💳 Tarjeta</button>
                        <button onclick="processPayment('${id}', 'transfer')" class="bg-purple-600 text-white py-2 rounded text-sm font-bold hover:bg-purple-700">📱 Transferencia</button>
                    </div>
                    ` : `
                    <div class="mt-2 text-xs text-green-700 font-bold text-center bg-green-50 py-1 rounded">
                        ✓ Método: ${order.paymentMethod || 'N/A'}
                    </div>
                    `}
                </div>
                `;
            }).join('');
        }
        function updateSummary(orders) {
            const totalOrders = Object.keys(orders).length;
            let revenue = 0;
            let pending = 0;
            
            Object.values(orders).forEach(order => {
                const total = parseFloat(order.total) || 0;
                if (order.paymentStatus === 'paid') {
                    revenue += total;
                } else {
                    pending += total;
                }
            });
            
            document.getElementById('totalOrders').textContent = totalOrders;
            document.getElementById('totalRevenue').textContent = formatCLP(revenue);
            document.getElementById('pendingPayment').textContent = formatCLP(pending);
        }
        
        function processPayment(orderId, method) {
            const methodNames = { 'cash': 'Efectivo', 'card': 'Tarjeta', 'transfer': 'Transferencia' };
            const amount = todayOrders[orderId]?.total || 0;
            
            if (!confirm(`¿Confirmar pago de ${formatCLP(amount)} CLP con ${methodNames[method]}?`)) return;
            
            db.ref('orders/' + orderId).update({
                paymentStatus: 'paid',
                paymentMethod: methodNames[method],
                paidAt: Date.now()
            }).then(() => {
                alert('✓ Pago registrado: ' + formatCLP(amount) + ' CLP');
            }).catch(err => {
                alert('Error: ' + err.message);
            });
        }
        
        function showSection(section) {
            document.getElementById('todaySection').classList.toggle('hidden', section !== 'today');
            document.getElementById('historySection').classList.toggle('hidden', section !== 'history');
        }
        
        function loadHistory() {
            const date = document.getElementById('historyDate').value;
            const container = document.getElementById('historyList');
            const statsDiv = document.getElementById('historyStats');
            
            container.innerHTML = '<div class="text-center py-4 text-gray-500">Cargando...</div>';
            statsDiv.classList.add('hidden');
            
            db.ref('orders').once('value', (snapshot) => {
                const allOrders = snapshot.val() || {};
                const filtered = {};
                
                Object.keys(allOrders).forEach(id => {
                    if (allOrders[id].date === date) filtered[id] = allOrders[id];
                });
                
                if (Object.keys(filtered).length === 0) {
                    container.innerHTML = `<div class="text-center text-gray-400 py-8">No hay pedidos para el ${date}</div>`;
                    return;
                }
                
                let dayRevenue = 0, totalDay = 0;
                Object.values(filtered).forEach(o => {
                    totalDay += o.total || 0;
                    if (o.paymentStatus === 'paid') dayRevenue += o.total || 0;
                });
                
                statsDiv.innerHTML = `Total: ${formatCLP(dayRevenue)} CLP / ${Object.keys(filtered).length} pedidos`;
                statsDiv.classList.remove('hidden');
                
                container.innerHTML = Object.keys(filtered)
                    .sort((a,b) => filtered[b].timestamp - filtered[a].timestamp)
                    .map(id => {
                        const o = filtered[id];
                        return `
                        <div class="bg-white p-3 rounded shadow border-l-4 ${o.paymentStatus==='paid'?'border-green-500':'border-red-500'}">
                            <div class="flex justify-between items-center">
                                <span class="font-bold text-gray-800">#${id.slice(-6)}</span>
                                <span class="text-lg font-bold ${o.paymentStatus==='paid'?'text-green-600':'text-red-600'}">${formatCLP(o.total)}</span>
                            </div>
                            <div class="text-sm text-gray-600 mt-1">${(o.items || []).map(i => i.quantity + 'x ' + i.name).join(', ')}</div>
                            <div class="flex justify-between items-center mt-2 text-xs">
                                <span class="text-gray-400">${new Date(o.timestamp).toLocaleTimeString('es-CL', {hour: '2-digit', minute:'2-digit'})}</span>
                                <span class="${o.paymentStatus==='paid' ? 'text-green-600 font-bold' : 'text-red-500 font-bold'}">${o.paymentStatus==='paid' ? `✓ ${o.paymentMethod}` : '⚠ SIN PAGAR'}</span>
                            </div>
                        </div>`;
                    }).join('');
            });
        }
        
        // 🔥 启动监听
        listenToOrders();
    </script>
</body>
</html>
