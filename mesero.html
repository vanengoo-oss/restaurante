<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 Caja con Historial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; background: #f3f4f6; }
        .order-card { animation: slideIn 0.3s ease-out; transition: all 0.3s; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .unpaid { border-left: 4px solid #ef4444; background: #fff; }
        .paid { border-left: 4px solid #22c55e; background: #f0fdf4; opacity: 0.8; }
        .date-selector { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .history-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); }
    </style>
</head>
<body class="p-4">
<div class="max-w-6xl mx-auto">
    <!-- 日期选择栏 -->
    <div class="date-selector rounded-2xl shadow-lg p-4 mb-6 text-white">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold mb-1">💰 Caja Registradora</h1>
                <p class="text-sm opacity-90" id="currentDateDisplay">18 de marzo de 2026</p>
            </div>
            <div class="flex gap-2 items-center flex-wrap justify-center">
                <button onclick="changeDate(-1)" class="bg-white bg-opacity-30 hover:bg-opacity-50 text-white px-3 py-2 rounded-lg font-bold text-sm">← Anterior</button>
                <input type="date" id="datePicker" class="bg-white text-gray-800 px-2 py-2 rounded-lg font-bold" onchange="selectDate(this.value)">
                <button onclick="changeDate(1)" class="bg-white bg-opacity-30 hover:bg-opacity-50 text-white px-3 py-2 rounded-lg font-bold text-sm">Siguiente →</button>
                <button onclick="goToday()" class="bg-yellow-400 text-yellow-900 px-3 py-2 rounded-lg font-bold text-sm">Hoy</button>
                <button onclick="showHistoryModal()" class="history-btn text-white px-3 py-2 rounded-lg font-bold text-sm">📊 Historial</button>
            </div>
        </div>
    </div>

    <!-- 收入统计 -->
    <div class="bg-white rounded-2xl shadow p-4 mb-6">
        <div class="flex justify-between items-center">
            <div>
                <div class="text-sm text-gray-500">💵 Ingresos del <span id="statsDate">día</span></div>
                <div class="text-3xl font-bold text-red-600">$<span id="dailyTotal">0</span> CLP</div>
            </div>
            <div class="text-center px-4 border-x">
                <div class="text-sm text-gray-500">Pedidos</div>
                <div class="text-2xl font-bold text-blue-600" id="dailyCount">0</div>
            </div>
            <div class="text-right">
                <div class="text-sm text-gray-500">Pagados</div>
                <div class="text-2xl font-bold text-green-600" id="paidCount">0</div>
            </div>
        </div>
    </div>

    <!-- 统计卡片 -->
    <div class="grid grid-cols-3 gap-4 mb-6">
        <div class="bg-white p-4 rounded-xl shadow text-center border-b-4 border-red-500">
            <div class="text-3xl font-bold text-red-600" id="countUnpaid">0</div>
            <div class="text-sm text-gray-500">Por Cobrar</div>
        </div>
        <div class="bg-white p-4 rounded-xl shadow text-center border-b-4 border-green-500">
            <div class="text-3xl font-bold text-green-600" id="countPaid">0</div>
            <div class="text-sm text-gray-500">Pagados</div>
        </div>
        <div class="bg-white p-4 rounded-xl shadow text-center border-b-4 border-blue-500">
            <div class="text-3xl font-bold text-blue-600" id="countTotal">0</div>
            <div class="text-sm text-gray-500">Total</div>
        </div>
    </div>
    <!-- 历史记录弹窗 -->
    <div id="historyModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 max-w-md w-full max-h-[80vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold">📊 Historial de Ingresos</h3>
                <button onclick="closeHistoryModal()" class="text-gray-500 text-2xl">✕</button>
            </div>
            <div id="historyList" class="space-y-2">
                <div class="text-center text-gray-400 py-4">Cargando...</div>
            </div>
        </div>
    </div>

    <!-- 订单列表 -->
    <div id="ordersList" class="grid gap-4 md:grid-cols-2">
        <div class="col-span-full text-center py-12 text-gray-400 bg-white rounded-xl">
            <div class="text-5xl mb-3">📭</div>
            <p>Sin pedidos en esta fecha</p>
        </div>
    </div>
</div>

<!-- 支付弹窗（同前） -->
<div id="payModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-6 max-w-sm w-full">
        <h3 class="text-xl font-bold mb-4">Confirmar Pago</h3>
        <div class="mb-4">
            <div class="text-sm text-gray-500 mb-1">Monto</div>
            <div class="text-3xl font-bold text-red-600">$<span id="payAmount">0</span> CLP</div>
        </div>
        <div class="mb-4">
            <div class="text-sm text-gray-500 mb-2">Método</div>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="selectMethod('cash')" class="pay-method-btn bg-blue-100 text-blue-700 py-3 rounded-xl font-bold border-2 border-transparent" data-method="cash">💵 Efectivo</button>
                <button onclick="selectMethod('card')" class="pay-method-btn bg-gray-100 text-gray-700 py-3 rounded-xl font-bold border-2 border-transparent" data-method="card">💳 Tarjeta</button>
                <button onclick="selectMethod('transfer')" class="pay-method-btn bg-gray-100 text-gray-700 py-3 rounded-xl font-bold border-2 border-transparent" data-method="transfer">📱 Transf.</button>
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="closePayModal()" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-xl font-bold">Cancelar</button>
            <button onclick="confirmPay()" class="flex-1 bg-green-600 text-white py-3 rounded-xl font-bold shadow-lg">Confirmar</button>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDlRWSAOCRX5MYsvilkMKYlwIazHEoSg4U",
    authDomain: "restaurante-tocopilla.firebaseapp.com",
    databaseURL: "https://restaurante-tocopilla-default-rtdb.firebaseio.com",
    projectId: "restaurante-tocopilla",
    storageBucket: "restaurante-tocopilla.firebasestorage.app",
    messagingSenderId: "322511272257",
    appId: "1:322511272257:web:7fe43210274eaf2fae89c0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentDate = getTodayString();
let currentPayKey = null;
let selectedMethod = 'cash';
let ordersListener = null;

function getTodayString() {
    const now = new Date();
    const chileTime = new Date(now.toLocaleString("en-US", {timeZone: "America/Santiago"}));
    return chileTime.getFullYear() + '-' + 
           String(chileTime.getMonth()+1).padStart(2,'0') + '-' + 
           String(chileTime.getDate()).padStart(2,'0');
}

function formatDate(dateStr) {
    const [y, m, d] = dateStr.split('-');
    const months = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];
    return `${d} de ${months[parseInt(m)-1]} de ${y}`;
}

document.getElementById('datePicker').value = currentDate;
document.getElementById('currentDateDisplay').textContent = formatDate(currentDate);
loadOrders(currentDate);
loadHistory();

// 自动检查日期变化（凌晨自动切换）
setInterval(() => {
    const now = getTodayString();
    if (now !== currentDate) {
        if (confirm('¡Nuevo día! ¿Cambiar a ' + formatDate(now) + '?')) {
            location.reload();
        }
    }
}, 60000);

function changeDate(days) {
    const date = new Date(currentDate);
    date.setDate(date.getDate() + days);
    const newDate = date.getFullYear() + '-' + String(date.getMonth()+1).padStart(2,'0') + '-' + String(date.getDate()).padStart(2,'0');
    selectDate(newDate);
}

function goToday() {
    selectDate(getTodayString());
}

function selectDate(date) {
    currentDate = date;
    document.getElementById('datePicker').value = date;
    document.getElementById('currentDateDisplay').textContent = formatDate(date);
    document.getElementById('statsDate').textContent = date === getTodayString() ? 'día' : formatDate(date);
    loadOrders(date);
}
function loadOrders(date) {
    if (ordersListener) db.ref('orders').off('value', ordersListener);
    
    ordersListener = db.ref('orders').orderByChild('date').equalTo(date).on('value', (snapshot) => {
        const orders = [];
        snapshot.forEach(child => {
            orders.push({ key: child.key, ...child.val() });
        });
        orders.reverse();
        renderOrders(orders);
        updateStats(orders);
        updateDailyTotal(orders);
    });
}

function renderOrders(orders) {
    const container = document.getElementById('ordersList');
    if (orders.length === 0) {
        container.innerHTML = '<div class="col-span-full text-center py-12 text-gray-400 bg-white rounded-xl"><div class="text-5xl mb-3">📭</div><p>Sin pedidos en esta fecha</p></div>';
        return;
    }
    
    container.innerHTML = orders.map(order => {
        const time = order.timestamp ? new Date(order.timestamp).toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'}) : '--:--';
        const isPaid = order.paymentStatus === 'paid';
        
        return `
            <div class="order-card ${isPaid ? 'paid' : 'unpaid'} rounded-xl shadow p-4">
                <div class="flex justify-between items-start mb-3">
                    <div>
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-2xl font-bold text-gray-800">Mesa ${order.table || '-'}</span>
                            <span class="text-xs bg-gray-100 px-2 py-1 rounded">${time}</span>
                            <span class="text-xs px-2 py-1 rounded ${isPaid ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                ${isPaid ? '✅ Pagado' : '⏳ Por Cobrar'}
                            </span>
                        </div>
                        <div class="space-y-1 text-sm text-gray-600">
                            ${order.items ? order.items.map(item => `
                                <div class="flex justify-between">
                                    <span>${item.emoji || '🍽️'} ${item.name} x${item.qty}</span>
                                    <span class="text-gray-500">$${(item.price * item.qty).toLocaleString()}</span>
                                </div>
                            `).join('') : ''}
                        </div>
                        ${order.note ? `<div class="mt-2 text-xs bg-yellow-50 text-yellow-800 p-2 rounded">💬 ${order.note}</div>` : ''}
                    </div>
                </div>
                <div class="flex justify-between items-center pt-3 border-t border-gray-100">
                    <div class="text-xl font-bold text-red-600">$${order.total?.toLocaleString() || 0}</div>
                    <div class="flex gap-2">
                        ${!isPaid ? 
                            `<button onclick="openPayModal('${order.key}', ${order.total})" class="bg-red-600 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-md">💰 Cobrar</button>` :
                            `<div class="text-green-600 font-bold text-sm">${order.paymentMethod}</div>`
                        }
                        <button onclick="deleteOrder('${order.key}')" class="bg-gray-200 text-gray-600 px-3 py-2 rounded-lg text-sm">🗑️</button>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

function updateStats(orders) {
    const unpaid = orders.filter(o => o.paymentStatus !== 'paid');
    const paid = orders.filter(o => o.paymentStatus === 'paid');
    
    document.getElementById('countUnpaid').textContent = unpaid.length;
    document.getElementById('countPaid').textContent = paid.length;
    document.getElementById('countTotal').textContent = orders.length;
    document.getElementById('paidCount').textContent = paid.length;
}

function updateDailyTotal(orders) {
    const total = orders.reduce((sum, o) => sum + (o.total || 0), 0);
    const count = orders.length;
    document.getElementById('dailyTotal').textContent = total.toLocaleString();
    document.getElementById('dailyCount').textContent = count;
    
    // 保存每日统计到独立节点（方便历史查询）
    db.ref(`dailyStats/${currentDate}`).set({
        date: currentDate,
        total: total,
        count: count,
        paidCount: orders.filter(o => o.paymentStatus === 'paid').length,
        updatedAt: firebase.database.ServerValue.TIMESTAMP
    });
}

// 历史记录功能
function showHistoryModal() {
    document.getElementById('historyModal').classList.remove('hidden');
    loadHistory();
}

function closeHistoryModal() {
    document.getElementById('historyModal').classList.add('hidden');
}

function loadHistory() {
    db.ref('dailyStats').orderByKey().limitToLast(30).once('value', (snapshot) => {
        const list = document.getElementById('historyList');
        if (!snapshot.exists()) {
            list.innerHTML = '<div class="text-center text-gray-400 py-4">Sin historial aún</div>';
            return;
        }
        
        const days = [];
        snapshot.forEach(child => {
            days.push({ date: child.key, ...child.val() });
        });
        days.reverse(); // 最新的在前
        
        list.innerHTML = days.map(day => `
            <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg hover:bg-gray-100 cursor-pointer" onclick="selectDate('${day.date}'); closeHistoryModal();">
                <div>
                    <div class="font-bold text-gray-800">${formatDate(day.date)}</div>
                    <div class="text-sm text-gray-500">${day.count || 0} pedidos</div>
                </div>
                <div class="text-right">
                    <div class="font-bold text-red-600">$${(day.total || 0).toLocaleString()}</div>
                    <div class="text-xs text-green-600">${day.paidCount || 0} pagados</div>
                </div>
            </div>
        `).join('');
    });
}

// 支付功能（同前）
function openPayModal(key, amount) {
    currentPayKey = key;
    document.getElementById('payAmount').textContent = amount.toLocaleString();
    document.getElementById('payModal').classList.remove('hidden');
    selectMethod('cash');
}

function closePayModal() {
    document.getElementById('payModal').classList.add('hidden');
    currentPayKey = null;
}

function selectMethod(method) {
    selectedMethod = method;
    document.querySelectorAll('.pay-method-btn').forEach(btn => {
        if (btn.dataset.method === method) {
            btn.classList.add('bg-blue-100', 'text-blue-700', 'border-blue-500');
            btn.classList.remove('bg-gray-100', 'text-gray-700', 'border-transparent');
        } else {
            btn.classList.remove('bg-blue-100', 'text-blue-700', 'border-blue-500');
            btn.classList.add('bg-gray-100', 'text-gray-700', 'border-transparent');
        }
    });
}

function confirmPay() {
    if (!currentPayKey) return;
    const methodNames = { cash: 'Efectivo', card: 'Tarjeta', transfer: 'Transferencia' };
    
    db.ref(`orders/${currentPayKey}`).update({
        paymentStatus: 'paid',
        paymentMethod: methodNames[selectedMethod],
        paidAt: firebase.database.ServerValue.TIMESTAMP
    }).then(() => {
        closePayModal();
        alert('✅ ¡Pago Confirmado!');
    });
}

function deleteOrder(key) {
    if (confirm('¿Eliminar este pedido?')) {
        db.ref(`orders/${key}`).remove();
    }
}
</script>
</body>
</html>
