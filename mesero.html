<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mesero - DEBUG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        .order-card { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .debug-info { background: #fff3cd; border: 1px solid #ffc107; padding: 8px; margin: 5px 0; font-family: monospace; font-size: 11px; color: #856404; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div class="max-w-4xl mx-auto">
        <header class="bg-red-600 text-white p-4 rounded-lg shadow mb-4">
            <h1 class="text-2xl font-bold">🍽️ Mesero - MODO DEBUG</h1>
            <p class="text-sm mt-1">Fecha: <span id="currentDate"></span> | Revisando cálculos...</p>
        </header>
        
        <div id="ordersList" class="space-y-3">
            <div class="text-center text-gray-500 py-8">Cargando...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://restaurante-tocopilla-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        function getChileDate() {
            const now = new Date();
            const chileTime = new Date(now.toLocaleString("en-US", {timeZone: "America/Santiago"}));
            return `${chileTime.getFullYear()}-${String(chileTime.getMonth()+1).padStart(2,'0')}-${String(chileTime.getDate()).padStart(2,'0')}`;
        }
        
        document.getElementById('currentDate').textContent = getChileDate();

        function formatCLP(amount) {
            if (!amount || isNaN(amount)) return '0';
            let num = parseFloat(amount);
            if (num > 0 && num < 1000) num = num * 1000;
            return Math.round(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }
        function listenToOrders() {
            db.ref('orders').on('value', (snapshot) => {
                const allOrders = snapshot.val() || {};
                const today = getChileDate();
                const todayOrders = {};
                
                Object.keys(allOrders).forEach(id => {
                    if (allOrders[id].date === today) {
                        todayOrders[id] = allOrders[id];
                    }
                });
                
                renderOrdersDebug(todayOrders);
            });
        }
        
        function renderOrdersDebug(orders) {
            const container = document.getElementById('ordersList');
            
            if (Object.keys(orders).length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-8">No hay pedidos</div>';
                return;
            }
            
            const sortedIds = Object.keys(orders).sort((a, b) => {
                return (orders[b].timestamp || 0) - (orders[a].timestamp || 0);
            });
            
            container.innerHTML = sortedIds.map(id => {
                const order = orders[id];
                const isPaid = order.paymentStatus === 'paid';
                
                // 🔥 DEBUG: 计算每个单项的小计，检查哪里出错了
                let calculatedTotal = 0;
                const itemDetails = (order.items || []).map((item, index) => {
                    const price = parseFloat(item.price) || 0;
                    const qty = parseInt(item.quantity) || 0;
                    const subtotal = price * qty;
                    calculatedTotal += subtotal;
                    
                    return `
                        <div class="flex justify-between text-sm ${subtotal !== (item.price * item.quantity) ? 'text-red-600 font-bold' : ''}">
                            <span>${index+1}. ${qty}x ${item.name} (@${formatCLP(price)})</span>
                            <span class="font-mono">${formatCLP(subtotal)}</span>
                        </div>
                        ${price !== item.price ? `<div class="text-xs text-red-500">⚠️ Precio original: ${item.price}, Usado: ${price}</div>` : ''}
                    `;
                }).join('');
                
                // 🔥 检查存储的 total 和计算的是否一致
                const storedTotal = parseFloat(order.total) || 0;
                const mismatch = Math.abs(storedTotal - calculatedTotal) > 1;
                
                return `
                <div class="order-card bg-white rounded-lg shadow p-4 border-l-4 ${isPaid ? 'border-green-500' : 'border-red-500'}">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="text-xs text-gray-500">#${id.slice(-6)}</span>
                            <span class="ml-2 px-2 py-1 rounded text-xs font-bold ${order.status === 'pending' ? 'bg-yellow-100 text-yellow-800' : order.status === 'cooking' ? 'bg-blue-100 text-blue-800' : order.status === 'ready' ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'}">
                                ${order.status || 'PENDIENTE'}
                            </span>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-bold text-gray-800">${formatCLP(order.total)}</div>
                            ${mismatch ? `<div class="text-red-600 text-xs font-bold">⚠️ Error de cálculo!</div>` : ''}
                        </div>
                    </div>
                    
                    <div class="space-y-1 mb-3 bg-gray-50 p-2 rounded">
                        ${itemDetails}
                    </div>
                    
                    <!-- 🔥 DEBUG INFO -->
                    <div class="debug-info">
                        <strong>DEBUG:</strong><br>
                        • Total guardado en DB: ${order.total} (${formatCLP(order.total)})<br>
                        • Total calculado: ${calculatedTotal} (${formatCLP(calculatedTotal)})<br>
                        • Diferencia: ${Math.abs(storedTotal - calculatedTotal)}<br>
                        • Nº de items: ${(order.items || []).length}<br>
                        ${mismatch ? '<span class="text-red-700 font-bold">❌ ERROR: El total no coincide con la suma de items!</span>' : '<span class="text-green-700">✓ Cálculo correcto</span>'}
                    </div>
                    
                    ${!isPaid ? `
                    <div class="mt-3 grid grid-cols-3 gap-2">
                        <button onclick="processPayment('${id}', 'cash')" class="bg-green-600 text-white py-2 rounded text-sm font-bold">💵 Efectivo</button>
                        <button onclick="processPayment('${id}', 'card')" class="bg-blue-600 text-white py-2 rounded text-sm font-bold">💳 Tarjeta</button>
                        <button onclick="processPayment('${id}', 'transfer')" class="bg-purple-600 text-white py-2 rounded text-sm font-bold">📱 Transferencia</button>
                    </div>
                    ` : `
                    <div class="mt-2 text-xs text-green-700 font-bold text-center bg-green-50 py-1 rounded">
                        ✓ Pagado: ${order.paymentMethod}
                    </div>
                    `}
                </div>
                `;
            }).join('');
        }
        
        function processPayment(orderId, method) {
            const methodNames = { 'cash': 'Efectivo', 'card': 'Tarjeta', 'transfer': 'Transferencia' };
            db.ref('orders/' + orderId).update({
                paymentStatus: 'paid',
                paymentMethod: methodNames[method],
                paidAt: Date.now()
            });
        }
        
        listenToOrders();
    </script>
</body>
</html>
