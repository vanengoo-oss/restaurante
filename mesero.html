<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mesero - Cobros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; touch-action: manipulation; }
        .order-card { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .btn-touch { min-height: 48px; min-width: 48px; touch-action: manipulation; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .tab-active { background: white; color: #2563eb; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .tab-inactive { background: rgba(255,255,255,0.2); color: white; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-100 pb-24">
    <!-- 顶部Header -->
    <header class="bg-blue-600 text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="flex justify-between items-center mb-2">
            <h1 class="text-xl font-bold">🍽️ Mesero</h1>
            <span class="text-xs bg-blue-800 px-3 py-1 rounded-full" id="currentDate"></span>
        </div>
        
        <!-- 切换标签 -->
        <div class="flex rounded-xl p-1 gap-1 bg-blue-700 mt-2">
            <button onclick="showSection('today')" id="btn-today" class="flex-1 py-3 rounded-lg font-bold text-sm transition tab-active">
                📋 Pedidos Hoy
            </button>
            <button onclick="showSection('history')" id="btn-history" class="flex-1 py-3 rounded-lg font-bold text-sm transition tab-inactive">
                📅 Historial
            </button>
        </div>
    </header>
    <!-- 今日订单区域 -->
    <div id="todaySection" class="p-3 space-y-3">
        <!-- 统计卡片（横向滚动） -->
        <div class="flex gap-3 overflow-x-auto hide-scrollbar pb-1">
            <div class="bg-white rounded-2xl p-4 min-w-[100px] text-center shadow-sm flex-1">
                <div class="text-3xl font-bold text-blue-600" id="totalOrders">0</div>
                <div class="text-xs text-gray-500 mt-1">Pedidos</div>
            </div>
            <div class="bg-white rounded-2xl p-4 min-w-[100px] text-center shadow-sm flex-1">
                <div class="text-2xl font-bold text-green-600" id="totalRevenue">0</div>
                <div class="text-xs text-gray-500 mt-1">Ingresos</div>
            </div>
            <div class="bg-white rounded-2xl p-4 min-w-[100px] text-center shadow-sm flex-1">
                <div class="text-2xl font-bold text-yellow-600" id="pendingPayment">0</div>
                <div class="text-xs text-gray-500 mt-1">Por Cobrar</div>
            </div>
        </div>

        <!-- 订单列表容器 -->
        <div id="ordersList" class="space-y-3">
            <div class="text-center text-gray-400 py-12">
                <div class="text-4xl mb-2">⏳</div>
                <div>Cargando pedidos...</div>
            </div>
        </div>
    </div>

    <!-- 历史记录区域 -->
    <div id="historySection" class="hidden p-3 space-y-3">
        <div class="bg-white rounded-2xl p-4 shadow-sm">
            <label class="text-sm font-bold text-gray-700 mb-3 block">Buscar por fecha</label>
            <input type="date" id="historyDate" class="w-full p-4 bg-gray-50 border rounded-xl text-lg mb-3">
            <button onclick="loadHistory()" class="btn-touch w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg active:scale-95 transition">
                🔍 Buscar
            </button>
        </div>
        <div id="historyStats" class="hidden bg-green-100 p-4 rounded-2xl text-center font-bold text-green-800 text-lg shadow-sm"></div>
        <div id="historyList" class="space-y-3"></div>
    </div>

    <script>
        // 格式化智利比索（带千位点）
        function formatCLP(amount) {
            if (!amount || isNaN(amount)) return '0';
            return Math.round(parseFloat(amount)).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        // Firebase配置
        const firebaseConfig = { 
            databaseURL: "https://restaurante-tocopilla-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // 获取智利日期
        function getChileDate() {
            const now = new Date();
            const chileTime = new Date(now.toLocaleString("en-US", {timeZone: "America/Santiago"}));
            return `${chileTime.getFullYear()}-${String(chileTime.getMonth()+1).padStart(2,'0')}-${String(chileTime.getDate()).padStart(2,'0')}`;
        }
        
        const today = getChileDate();
        document.getElementById('currentDate').textContent = today;
        document.getElementById('historyDate').value = today;
        
        let todayOrders = {};
        // 监听今日订单
        function listenToOrders() {
            db.ref('orders').on('value', (snapshot) => {
                const allOrders = snapshot.val() || {};
                todayOrders = {};
                
                Object.keys(allOrders).forEach(id => {
                    if (allOrders[id].date === today) {
                        todayOrders[id] = allOrders[id];
                    }
                });
                
                renderOrders(todayOrders);
                updateSummary(todayOrders);
            }, (error) => {
                console.error("Error:", error);
                document.getElementById('ordersList').innerHTML = 
                    `<div class="text-red-500 text-center py-8">Error de conexión</div>`;
            });
        }
        
        // 渲染订单列表
        function renderOrders(orders) {
            const container = document.getElementById('ordersList');
            
            if (Object.keys(orders).length === 0) {
                container.innerHTML = `
                    <div class="text-center text-gray-400 py-16">
                        <div class="text-6xl mb-4">📭</div>
                        <div class="text-lg">No hay pedidos para hoy</div>
                    </div>`;
                return;
            }
            
            // 按时间倒序排列（最新的在上面）
            const sortedIds = Object.keys(orders).sort((a, b) => {
                return (orders[b].timestamp || 0) - (orders[a].timestamp || 0);
            });
            
            container.innerHTML = sortedIds.map(id => {
                const order = orders[id];
                const isPaid = order.paymentStatus === 'paid';
                const statusText = {
                    'pending': '⏳ PENDIENTE',
                    'cooking': '🔥 COCINANDO', 
                    'ready': '✅ LISTO',
                    'done': '✓ ENTREGADO'
                }[order.status] || '⏳ PENDIENTE';
                
                const statusColor = {
                    'pending': 'bg-yellow-100 text-yellow-800',
                    'cooking': 'bg-blue-100 text-blue-800',
                    'ready': 'bg-green-100 text-green-800',
                    'done': 'bg-gray-100 text-gray-800'
                }[order.status] || 'bg-yellow-100 text-yellow-800';
                
                return `
                <div class="order-card bg-white rounded-2xl shadow-lg border-l-8 ${isPaid ? 'border-green-500' : 'border-red-500'} p-4 mb-4">
                    <!-- 头部：单号 + 金额 -->
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-2xl font-bold text-gray-800">#${id.slice(-4)}</span>
                                <span class="text-xs px-3 py-1 rounded-full font-bold ${statusColor}">
                                    ${statusText}
                                </span>
                            </div>
                            <div class="text-xs text-gray-400 mt-1">
                                ${new Date(order.timestamp).toLocaleTimeString('es-CL', {hour: '2-digit', minute:'2-digit'})}
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-3xl font-bold ${isPaid ? 'text-green-600' : 'text-gray-800'}">
                                ${formatCLP(order.total)}
                            </div>
                            <div class="text-xs ${isPaid ? 'text-green-600 bg-green-100' : 'text-red-600 bg-red-100'} px-3 py-1 rounded-full font-bold mt-1 inline-block">
                                ${isPaid ? '✓ PAGADO' : '⚠ POR COBRAR'}
                            </div>
                        </div>
                    </div>
                    
                    <!-- 订单详情 -->
                    <div class="bg-gray-50 rounded-xl p-3 mb-3 space-y-2">
                        ${(order.items || []).map(item => `
                            <div class="flex justify-between items-center text-sm py-1 border-b border-gray-200 last:border-0">
                                <div class="flex items-center gap-2">
                                    <span class="bg-blue-100 text-blue-800 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">${item.quantity}</span>
                                    <span class="text-gray-700">${item.name}</span>
                                </div>
                                <span class="font-mono text-gray-600 font-bold">${formatCLP(item.price * item.quantity)}</span>
                            </div>
                        `).join('')}
                    </div>
                    
                    ${!isPaid ? `
                    <!-- 支付按钮（3列大按钮） -->
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="processPayment('${id}', 'cash')" 
                            class="btn-touch bg-green-500 active:bg-green-600 text-white py-4 rounded-xl font-bold text-sm shadow-lg active:scale-95 transition flex flex-col items-center gap-1">
                            <span class="text-xl">💵</span>
                            <span>Efectivo</span>
                        </button>
                        <button onclick="processPayment('${id}', 'card')" 
                            class="btn-touch bg-blue-500 active:bg-blue-600 text-white py-4 rounded-xl font-bold text-sm shadow-lg active:scale-95 transition flex flex-col items-center gap-1">
                            <span class="text-xl">💳</span>
                            <span>Tarjeta</span>
                        </button>
                        <button onclick="processPayment('${id}', 'transfer')" 
                            class="btn-touch bg-purple-500 active:bg-purple-600 text-white py-4 rounded-xl font-bold text-sm shadow-lg active:scale-95 transition flex flex-col items-center gap-1">
                            <span class="text-xl">📱</span>
                            <span>Transf</span>
                        </button>
                    </div>
                    ` : `
                    <div class="bg-green-50 text-green-800 text-center py-3 rounded-xl font-bold text-sm border border-green-200">
                        ✓ Pagado con: ${order.paymentMethod || 'Efectivo'}
                    </div>
                    `}
                </div>
                `;
            }).join('');
        }

        // 更新统计摘要
        function updateSummary(orders) {
            let revenue = 0;
            let pending = 0;
            
            Object.values(orders).forEach(order => {
                const total = parseFloat(order.total) || 0;
                if (order.paymentStatus === 'paid') {
                    revenue += total;
                } else {
                    pending += total;
                }
            });
            
            document.getElementById('totalOrders').textContent = Object.keys(orders).length;
            document.getElementById('totalRevenue').textContent = formatCLP(revenue);
            document.getElementById('pendingPayment').textContent = formatCLP(pending);
        }
        
        // 处理支付
        function processPayment(orderId, method) {
            const methodNames = { 
                'cash': 'Efectivo', 
                'card': 'Tarjeta', 
                'transfer': 'Transferencia' 
            };
            const amount = todayOrders[orderId]?.total || 0;
            
            if (!confirm(`¿Confirmar pago?\n\nMonto: ${formatCLP(amount)} CLP\nMétodo: ${methodNames[method]}`)) {
                return;
            }
            
            db.ref('orders/' + orderId).update({
                paymentStatus: 'paid',
                paymentMethod: methodNames[method],
                paidAt: Date.now()
            }).then(() => {
                // 成功提示（震动反馈如果支持）
                if (navigator.vibrate) navigator.vibrate(50);
                // 不需要alert，因为 Firebase 监听会自动更新UI
            }).catch(err => {
                alert('Error: ' + err.message);
            });
        }
        // 切换今日/历史视图
        function showSection(section) {
            const todaySec = document.getElementById('todaySection');
            const historySec = document.getElementById('historySection');
            const btnToday = document.getElementById('btn-today');
            const btnHistory = document.getElementById('btn-history');
            
            if (section === 'today') {
                todaySec.classList.remove('hidden');
                historySec.classList.add('hidden');
                btnToday.className = 'flex-1 py-3 rounded-lg font-bold text-sm transition tab-active';
                btnHistory.className = 'flex-1 py-3 rounded-lg font-bold text-sm transition tab-inactive';
            } else {
                todaySec.classList.add('hidden');
                historySec.classList.remove('hidden');
                btnToday.className = 'flex-1 py-3 rounded-lg font-bold text-sm transition tab-inactive';
                btnHistory.className = 'flex-1 py-3 rounded-lg font-bold text-sm transition tab-active';
            }
        }
        
        // 加载历史记录
        function loadHistory() {
            const date = document.getElementById('historyDate').value;
            const container = document.getElementById('historyList');
            const statsDiv = document.getElementById('historyStats');
            
            container.innerHTML = '<div class="text-center py-8 text-gray-500">Cargando...</div>';
            statsDiv.classList.add('hidden');
            
            db.ref('orders').once('value', (snapshot) => {
                const allOrders = snapshot.val() || {};
                const filtered = {};
                
                Object.keys(allOrders).forEach(id => {
                    if (allOrders[id].date === date) {
                        filtered[id] = allOrders[id];
                    }
                });
                
                if (Object.keys(filtered).length === 0) {
                    container.innerHTML = `
                        <div class="text-center text-gray-400 py-12">
                            <div class="text-6xl mb-4">📭</div>
                            <div>No hay pedidos para<br>${date}</div>
                        </div>`;
                    return;
                }
                
                let dayRevenue = 0;
                Object.values(filtered).forEach(o => {
                    if (o.paymentStatus === 'paid') dayRevenue += o.total || 0;
                });
                
                statsDiv.innerHTML = `💰 Total: ${formatCLP(dayRevenue)} CLP<br><span class="text-sm">(${Object.keys(filtered).length} pedidos)</span>`;
                statsDiv.classList.remove('hidden');
                
                container.innerHTML = Object.keys(filtered)
                    .sort((a,b) => filtered[b].timestamp - filtered[a].timestamp)
                    .map(id => {
                        const o = filtered[id];
                        return `
                        <div class="bg-white rounded-2xl shadow p-4 border-l-4 ${o.paymentStatus==='paid'?'border-green-500':'border-red-500'}">
                            <div class="flex justify-between items-center mb-2">
                                <span class="font-bold text-gray-800 text-lg">#${id.slice(-4)}</span>
                                <span class="text-xl font-bold ${o.paymentStatus==='paid'?'text-green-600':'text-red-600'}">
                                    ${formatCLP(o.total)}
                                </span>
                            </div>
                            <div class="text-sm text-gray-600 mb-2">
                                ${(o.items || []).map(i => `${i.quantity}x ${i.name}`).join(', ')}
                            </div>
                            <div class="flex justify-between items-center text-xs">
                                <span class="text-gray-400">${new Date(o.timestamp).toLocaleTimeString('es-CL', {hour:'2-digit', minute:'2-digit'})}</span>
                                <span class="${o.paymentStatus==='paid' ? 'text-green-600 font-bold' : 'text-red-500 font-bold'}">
                                    ${o.paymentStatus==='paid' ? `✓ ${o.paymentMethod}` : '⚠ SIN PAGAR'}
                                </span>
                            </div>
                        </div>`;
                    }).join('');
            });
        }
        
        // 启动监听
        listenToOrders();
    </script>
</body>
</html>
