<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mesero - Cobros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .order-card { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .btn-touch { min-height: 48px; touch-action: manipulation; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 20px); }
    </style>
</head>
<body class="bg-gray-100 pb-24">
    <!-- 顶部 -->
    <header class="bg-blue-600 text-white p-4 sticky top-0 z-50 shadow-lg">
        <h1 class="text-lg font-bold text-center">🍽️ Panel de Mesero</h1>
        <p class="text-xs text-center text-blue-100 mt-1" id="currentDate"></p>
        
        <!-- 切换按钮 -->
        <div class="flex bg-blue-700 rounded-lg p-1 mt-3">
            <button onclick="showSection('today')" id="btn-today" class="flex-1 py-2 rounded-md font-bold text-sm bg-white text-blue-600 shadow transition">Pedidos Hoy</button>
            <button onclick="showSection('history')" id="btn-history" class="flex-1 py-2 rounded-md font-bold text-sm text-blue-100 transition">Historial</button>
        </div>
    </header>

    <!-- 今日订单 -->
    <div id="todaySection" class="p-3 space-y-3">
        <!-- 统计卡片 -->
        <div class="grid grid-cols-3 gap-2 mb-2">
            <div class="bg-white rounded-xl p-3 text-center shadow-sm">
                <div class="text-xs text-gray-500 mb-1">Pedidos</div>
                <div class="text-2xl font-bold text-blue-600" id="totalOrders">0</div>
            </div>
            <div class="bg-white rounded-xl p-3 text-center shadow-sm">
                <div class="text-xs text-gray-500 mb-1">Ingresos</div>
                <div class="text-xl font-bold text-green-600" id="totalRevenue">0</div>
            </div>
            <div class="bg-white rounded-xl p-3 text-center shadow-sm">
                <div class="text-xs text-gray-500 mb-1">Por Cobrar</div>
                <div class="text-xl font-bold text-yellow-600" id="pendingPayment">0</div>
            </div>
        </div>

        <div id="ordersList" class="space-y-3">
            <div class="text-center text-gray-400 py-8">Cargando...</div>
        </div>
    </div>

    <!-- 历史记录 -->
    <div id="historySection" class="hidden p-3 space-y-3">
        <div class="bg-white rounded-xl p-4 shadow-sm">
            <label class="text-sm font-bold text-gray-700 mb-2 block">Seleccionar Fecha</label>
            <input type="date" id="historyDate" class="w-full p-3 bg-gray-50 border rounded-xl text-lg mb-3">
            <button onclick="loadHistory()" class="btn-touch w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg active:scale-95 transition">Buscar Historial</button>
        </div>
        <div id="historyStats" class="hidden bg-green-100 p-4 rounded-xl text-center font-bold text-green-800 text-lg"></div>
        <div id="historyList" class="space-y-3"></div>
    </div>

    <script>
        function formatCLP(amount) {
            if (!amount || isNaN(amount)) return '0';
            return Math.round(parseFloat(amount)).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        const firebaseConfig = { databaseURL: "https://restaurante-tocopilla-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        function getChileDate() {
            const now = new Date();
            const chileTime = new Date(now.toLocaleString("en-US", {timeZone: "America/Santiago"}));
            return `${chileTime.getFullYear()}-${String(chileTime.getMonth()+1).padStart(2,'0')}-${String(chileTime.getDate()).padStart(2,'0')}`;
        }
        
        const today = getChileDate();
        document.getElementById('currentDate').textContent = today;
        document.getElementById('historyDate').value = today;
        
        let todayOrders = {};
        
        // 第1段结束，第2段继续...
        function listenToOrders() {
            db.ref('orders').on('value', (snapshot) => {
                const allOrders = snapshot.val() || {};
                todayOrders = {};
                Object.keys(allOrders).forEach(id => {
                    if (allOrders[id].date === today) todayOrders[id] = allOrders[id];
                });
                renderOrders(todayOrders);
                updateSummary(todayOrders);
            });
        }
        
        function renderOrders(orders) {
            const container = document.getElementById('ordersList');
            if (Object.keys(orders).length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-12 text-lg">No hay pedidos hoy</div>';
                return;
            }
            
            const sortedIds = Object.keys(orders).sort((a, b) => (orders[b].timestamp || 0) - (orders[a].timestamp || 0));
            
            container.innerHTML = sortedIds.map(id => {
                const order = orders[id];
                const isPaid = order.paymentStatus === 'paid';
                
                return `
                <div class="order-card bg-white rounded-xl shadow-lg border-l-8 ${isPaid ? 'border-green-500' : 'border-red-500'} p-4">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-xl font-bold text-gray-800">#${id.slice(-4)}</span>
                                <span class="text-xs px-2 py-1 rounded-full font-bold ${order.status === 'pending' ? 'bg-yellow-100 text-yellow-800' : order.status === 'cooking' ? 'bg-blue-100 text-blue-800' : order.status === 'ready' ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'}">
                                    ${order.status === 'pending' ? 'PEND' : order.status === 'cooking' ? 'COC' : order.status === 'ready' ? 'LISTO' : 'DONE'}
                                </span>
                            </div>
                            <div class="text-xs text-gray-400">${new Date(order.timestamp).toLocaleTimeString('es-CL', {hour: '2-digit', minute:'2-digit'})}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-3xl font-bold ${isPaid ? 'text-green-600' : 'text-gray-800'}">${formatCLP(order.total)}</div>
                            <div class="text-xs ${isPaid ? 'text-green-600 bg-green-100' : 'text-red-600 bg-red-100'} px-2 py-1 rounded-full font-bold mt-1 inline-block">
                                ${isPaid ? '✓ PAGADO' : '⚠ PENDIENTE'}
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-gray-50 rounded-lg p-3 mb-3 space-y-2">
                        ${(order.items || []).map(item => `
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-700"><span class="font-bold">${item.quantity}x</span> ${item.name}</span>
                                <span class="font-mono text-gray-600">${formatCLP(item.price * item.quantity)}</span>
                            </div>
                        `).join('')}
                    </div>
                    
                    ${!isPaid ? `
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="processPayment('${id}', 'cash')" class="btn-touch bg-green-500 active:bg-green-600 text-white py-3 rounded-xl font-bold text-sm shadow-lg active:scale-95 transition">💵 Efectivo</button>
                        <button onclick="processPayment('${id}', 'card')" class="btn-touch bg-blue-500 active:bg-blue-600 text-white py-3 rounded-xl font-bold text-sm shadow-lg active:scale-95 transition">💳 Tarjeta</button>
                        <button onclick="processPayment('${id}', 'transfer')" class="btn-touch bg-purple-500 active:bg-purple-600 text-white py-3 rounded-xl font-bold text-sm shadow-lg active:scale-95 transition">📱 Transf</button>
                    </div>
                    ` : `
                    <div class="bg-green-50 text-green-800 text-center py-2 rounded-lg font-bold text-sm">
                        ✓ ${order.paymentMethod || 'Pagado'}
                    </div>
                    `}
                </div>
                `;
            }).join('');
        }

        function updateSummary(orders) {
            let revenue = 0, pending = 0;
            Object.values(orders).forEach(order => {
                const total = parseFloat(order.total) || 0;
                if (order.paymentStatus === 'paid') revenue += total;
                else pending += total;
            });
            document.getElementById('totalOrders').textContent = Object.keys(orders).length;
            document.getElementById('totalRevenue').textContent = formatCLP(revenue);
            document.getElementById('pendingPayment').textContent = formatCLP(pending);
        }
        
        function processPayment(orderId, method) {
            const methodNames = { 'cash': 'Efectivo', 'card': 'Tarjeta', 'transfer': 'Transferencia' };
            const amount = todayOrders[orderId]?.total || 0;
            
            if (!confirm(`Confirmar pago de ${formatCLP(amount)} CLP\nMétodo: ${methodNames[method]}?`)) return;
            
            db.ref('orders/' + orderId).update({
                paymentStatus: 'paid', paymentMethod: methodNames[method], paidAt: Date.now()
            }).then(() => alert('✓ Pago registrado'));
        }
        
        function showSection(section) {
            document.getElementById('todaySection').classList.toggle('hidden', section !== 'today');
            document.getElementById('historySection').classList.toggle('hidden', section !== 'history');
            document.getElementById('btn-today').className = section === 'today' ? 'flex-1 py-2 rounded-md font-bold text-sm bg-white text-blue-600 shadow transition' : 'flex-1 py-2 rounded-md font-bold text-sm text-blue-100 transition';
            document.getElementById('btn-history').className = section === 'history' ? 'flex-1 py-2 rounded-md font-bold text-sm bg-white text-blue-600 shadow transition' : 'flex-1 py-2 rounded-md font-bold text-sm text-blue-100 transition';
        }
        
        function loadHistory() {
            const date = document.getElementById('historyDate').value;
            db.ref('orders').once('value', (snapshot) => {
                const all = snapshot.val() || {};
                const filtered = {};
                Object.keys(all).forEach(id => { if (all[id].date === date) filtered[id] = all[id]; });
                
                const statsDiv = document.getElementById('historyStats');
                const container = document.getElementById('historyList');
                
                if (Object.keys(filtered).length === 0) {
                    container.innerHTML = `<div class="text-center text-gray-400 py-8">No hay pedidos para ${date}</div>`;
                    statsDiv.classList.add('hidden');
                    return;
                }
                
                let revenue = 0;
                Object.values(filtered).forEach(o => { if (o.paymentStatus === 'paid') revenue += o.total || 0; });
                
                statsDiv.innerHTML = `Total: ${formatCLP(revenue)} CLP`;
                statsDiv.classList.remove('hidden');
                
                container.innerHTML = Object.keys(filtered).sort((a,b) => filtered[b].timestamp - filtered[a].timestamp).map(id => {
                    const o = filtered[id];
                    return `
                    <div class="bg-white rounded-xl shadow p-4 border-l-4 ${o.paymentStatus==='paid'?'border-green-500':'border-red-500'}">
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-bold text-gray-800">#${id.slice(-4)}</span>
                            <span class="text-xl font-bold ${o.paymentStatus==='paid'?'text-green-600':'text-red-600'}">${formatCLP(o.total)}</span>
                        </div>
                        <div class="text-sm text-gray-600">${(o.items || []).map(i => i.quantity + 'x ' + i.name).join(', ')}</div>
                    </div>`;
                }).join('');
            });
        }
        
        listenToOrders();
    </script>
</body>
</html>
