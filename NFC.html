<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC 联机对战</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 50%,#16213e 100%);min-height:100vh;color:white;overflow-x:hidden}
        .container{max-width:1200px;margin:0 auto;padding:10px}
        .lobby-screen{text-align:center;padding:40px 20px;max-width:600px;margin:0 auto}
        .game-title{font-size:2.5em;margin-bottom:10px;background:linear-gradient(to right,#00d4ff,#f39c12,#e74c3c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .player-setup{background:rgba(255,255,255,0.05);border-radius:20px;padding:30px;margin:30px 0;border:2px solid rgba(255,255,255,0.1)}
        .setup-row{margin:20px 0;display:flex;align-items:center;justify-content:center;gap:15px;flex-wrap:wrap}
        .setup-label{font-size:1.1em;min-width:100px;text-align:right}
        .player-counter{display:flex;align-items:center;gap:15px;background:rgba(0,0,0,0.3);padding:10px 20px;border-radius:30px}
        .counter-btn{width:40px;height:40px;border-radius:50%;border:none;background:#00d4ff;color:white;font-size:1.5em;cursor:pointer}
        .counter-value{font-size:1.5em;font-weight:bold;min-width:30px}
        .mode-selector{display:flex;gap:15px;justify-content:center;flex-wrap:wrap}
        .mode-option{padding:20px 30px;border:3px solid;border-radius:15px;cursor:pointer;transition:all 0.3s;min-width:120px}
        .mode-option.pve{border-color:#2ecc71;color:#2ecc71}
        .mode-option.pvp{border-color:#e74c3c;color:#e74c3c}
        .mode-option.single{border-color:#00d4ff;color:#00d4ff}
        .mode-option.selected{background:currentColor;color:white}
        .start-btn{background:linear-gradient(45deg,#f39c12,#e74c3c);border:none;padding:20px 60px;font-size:1.3em;color:white;border-radius:30px;cursor:pointer;margin-top:30px;font-weight:bold}
        .start-btn:disabled{background:#555;cursor:not-allowed}
        .room-info{background:rgba(0,212,255,0.1);border:2px solid #00d4ff;border-radius:15px;padding:20px;margin:20px 0}
        .room-code{font-size:2em;font-family:monospace;color:#f39c12;letter-spacing:5px;margin:10px 0}
        .player-list{display:flex;gap:15px;justify-content:center;margin:20px 0;flex-wrap:wrap}
        .player-badge{background:rgba(255,255,255,0.1);padding:15px 25px;border-radius:20px;border:2px solid transparent}
        .player-badge.ready{border-color:#2ecc71;box-shadow:0 0 20px rgba(46,204,113,0.3)}
        .ready-btn{background:#2ecc71;border:none;padding:10px 30px;border-radius:20px;color:white;cursor:pointer;margin-top:20px}
        .join-section{background:rgba(255,255,255,0.05);border-radius:15px;padding:20px;margin:20px 0}
        .hidden{display:none!important}
    
/* 攻击特效 */
@keyframes shake {
    0%, 100% { transform: translate(0, 0); }
    10% { transform: translate(-5px, -5px); }
    20% { transform: translate(5px, 5px); }
    30% { transform: translate(-5px, 5px); }
    40% { transform: translate(5px, -5px); }
    50% { transform: translate(-3px, 3px); }
    60% { transform: translate(3px, -3px); }
    70% { transform: translate(-2px, 2px); }
    80% { transform: translate(2px, -2px); }
    90% { transform: translate(-1px, 1px); }
}

@keyframes flash {
    0%, 100% { opacity: 0; }
    50% { opacity: 0.8; }
}
@keyframes slash {
    0% { transform: translateX(-100px) rotate(-45deg); opacity: 1; }
    100% { transform: translateX(100px) rotate(-45deg); opacity: 0; }
}

@keyframes particle {
    0% { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
}

.screen-shake {
    animation: shake 0.5s ease-out;
}

.flash-effect {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: white;
    pointer-events: none;
    z-index: 999;
    animation: flash 0.2s ease-out;
}

.slash-effect {
    position: fixed;
    width: 100px;
    height: 10px;
    background: linear-gradient(90deg, transparent, #fff, #f39c12, transparent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 998;
    animation: slash 0.3s ease-out;
}

.particle {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 997;
    animation: particle 0.6s ease-out forwards;
}
.critical-hit {
    color: #e74c3c !important;
    font-size: 1.5em !important;
    text-shadow: 0 0 20px #e74c3c, 0 0 40px #e74c3c !important;
}
/* 暴击文字弹出 */
@keyframes critPop {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
}

/* 火球动画 */
@keyframes fireBall {
    0% { transform: translateX(0) scale(0.5); opacity: 1; }
    100% { transform: translateX(300px) scale(1.5); opacity: 0; }
}

/* 火焰粒子 */
@keyframes fireParticle {
    0% { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
}

/* 冰刺动画 */
@keyframes iceSpike {
    0% { transform: translateY(-100px) rotate(var(--r, 0deg)); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(0) rotate(var(--r, 0deg)); opacity: 0.8; }
}
/* 爪痕特效 */
@keyframes clawSlash {
    0% { transform: translateX(-200%) skewX(-20deg); opacity: 0; }
    20% { transform: translateX(-50%) skewX(-20deg); opacity: 1; }
    80% { transform: translateX(50%) skewX(-20deg); opacity: 1; }
    100% { transform: translateX(200%) skewX(-20deg); opacity: 0; }
}

@keyframes clawMark {
    0% { transform: scale(0) rotate(-10deg); opacity: 0; }
    30% { transform: scale(1.2) rotate(-10deg); opacity: 1; }
    100% { transform: scale(1) rotate(-10deg); opacity: 0.8; }
}

.claw-container {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    pointer-events: none;
    z-index: 1000;
    overflow: hidden;
}

.claw-line {
    position: absolute;
    width: 150%;
    height: 8px;
    background: linear-gradient(90deg, 
        transparent 0%, 
        rgba(231, 76, 60, 0.9) 20%, 
        #e74c3c 50%, 
        rgba(231, 76, 60, 0.9) 80%, 
        transparent 100%
    );
    box-shadow: 0 0 30px #e74c3c, 0 0 60px #c0392b;
    animation: clawSlash 0.4s ease-out;
}
.claw-mark {
    position: absolute;
    width: 120px;
    height: 40px;
    background: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 15px,
        rgba(231, 76, 60, 0.8) 15px,
        rgba(231, 76, 60, 0.8) 25px,
        transparent 25px,
        transparent 35px
    );
    border-radius: 50%;
    filter: blur(2px);
    animation: clawMark 0.5s ease-out forwards;
}

.claw-mark::before,
.claw-mark::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    background: inherit;
    border-radius: inherit;
}

.claw-mark::before {
    transform: translateY(-20px) rotate(-5deg);
    opacity: 0.6;
}

.claw-mark::after {
    transform: translateY(20px) rotate(5deg);
    opacity: 0.6;
}

/* 血液飞溅 */
@keyframes bloodSplash {
    0% { transform: scale(0); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.8; }
    100% { transform: scale(2); opacity: 0; }
}
.blood-splash {
    position: fixed;
    width: 100px;
    height: 100px;
    background: radial-gradient(circle, #e74c3c 0%, #c0392b 40%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 999;
    animation: bloodSplash 0.6s ease-out forwards;
}

/* 警告闪烁 */
@keyframes warningPulse {
    0%, 100% { box-shadow: inset 0 0 0 rgba(231, 76, 60, 0); }
    50% { box-shadow: inset 0 0 100px rgba(231, 76, 60, 0.8); }
}

.boss-warning {
    animation: warningPulse 0.5s ease-in-out 3;
}

</style>
</head>

    <script>
// 攻击特效函数
function playAttackEffect(target, isCritical, cardType) {
    // 屏幕震动
    document.body.classList.add('screen-shake');
    setTimeout(() => document.body.classList.remove('screen-shake'), 500);

    // 根据卡片类型显示不同特效
    if (cardType === 'fire' || cardType === 'aoe') {
        // 火焰特效
        createFireEffect(target);
    } else if (cardType === 'ice' || cardType === 'control') {
        // 冰霜特效
        createIceEffect(target);
    } else {
        // 默认剑气特效
        const slash = document.createElement('div');
        slash.className = 'slash-effect';
        if (target === 'enemy') {
            slash.style.left = '50%';
            slash.style.top = '20%';
            slash.style.transform = 'translate(-50%, -50%) rotate(-30deg)';
        } else {
            const el = document.getElementById('mini-' + target);
            if (el) {
                const rect = el.getBoundingClientRect();
                slash.style.left = rect.left + rect.width/2 + 'px';
                slash.style.top = rect.top + 'px';
            }
        }
        document.body.appendChild(slash);
        setTimeout(() => slash.remove(), 300);
    }
    // 闪光效果
    const flash = document.createElement('div');
    flash.className = 'flash-effect';
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 200);

    // 粒子爆炸效果
    createParticles(target);

    // 暴击时额外特效
    if (isCritical) {
        setTimeout(() => {
            const flash2 = document.createElement('div');
            flash2.className = 'flash-effect';
            flash2.style.background = '#e74c3c';
            document.body.appendChild(flash2);
            setTimeout(() => flash2.remove(), 150);

            // 暴击文字
            const critText = document.createElement('div');
            critText.textContent = 'CRITICAL!';
            critText.style.cssText = 'position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);font-size:3em;font-weight:bold;color:#e74c3c;text-shadow:0 0 30px #e74c3c;pointer-events:none;z-index:1001;animation:critPop 0.5s ease-out;';
            document.body.appendChild(critText);
            setTimeout(() => critText.remove(), 500);
        }, 100);
    }
}

function createFireEffect(target) {
    const container = document.createElement('div');
    container.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:998;';

    // 火球
    const fireball = document.createElement('div');
    fireball.style.cssText = 'position:absolute;width:60px;height:60px;background:radial-gradient(circle,#f39c12,#e74c3c);border-radius:50%;box-shadow:0 0 40px #e74c3c,0 0 80px #f39c12;animation:fireBall 0.5s ease-out forwards;';
    fireball.style.left = '10%';
    fireball.style.top = '50%';
    container.appendChild(fireball);
    // 火焰粒子
    for (let i = 0; i < 15; i++) {
        const fire = document.createElement('div');
        fire.style.cssText = 'position:absolute;width:20px;height:20px;background:#e74c3c;border-radius:50%;animation:fireParticle 0.6s ease-out forwards;';
        fire.style.left = (40 + Math.random() * 20) + '%';
        fire.style.top = (10 + Math.random() * 30) + '%';
        fire.style.setProperty('--tx', (Math.random() * 100 - 50) + 'px');
        fire.style.setProperty('--ty', (Math.random() * 100 - 50) + 'px');
        container.appendChild(fire);
    }

    document.body.appendChild(container);
    setTimeout(() => container.remove(), 1000);
}

function createIceEffect(target) {
    const container = document.createElement('div');
    container.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:998;';

    // 冰刺
    for (let i = 0; i < 8; i++) {
        const ice = document.createElement('div');
        ice.style.cssText = 'position:absolute;width:10px;height:60px;background:linear-gradient(180deg,#a8e6cf,#00d4ff);transform:rotate(' + (Math.random() * 40 - 20) + 'deg);animation:iceSpike 0.4s ease-out forwards;';
        ice.style.left = (30 + i * 5) + '%';
        ice.style.top = '20%';
        container.appendChild(ice);
    }

    document.body.appendChild(container);
    setTimeout(() => container.remove(), 600);
}

        function handleCardScan(cardId) {

    }

        return;
    }
    const card = CARD_DB[cardId];
    if (!card) {
        log('未知卡片: ' + cardId, 'system');
        return;
    }
    currentP.hasDrawnThisTurn = true;
    const existing = currentP.hand.find(c => c.id === cardId && c.uses > 0);
    if (existing) {
        existing.uses += card.uses;
        log(currentP.name + ' 获得 ' + card.name + ' x' + card.uses, 'system');
    } else {
        const newCard = {...card, id: cardId, uid: Date.now() + Math.random(), currentCd: 0};

            damagePlayer(target.id, dmg);
            showFloat('-' + dmg, target.id);
            log('💥 Boss 对 ' + target.name + ' 造成 ' + dmg + ' 伤害（跳过惩罚）', 'system');

            // 检查玩家是否全灭
            if (game.players.filter(pl => !pl.dead).length === 0) {
                lose();
                return;
            }
        }
    }

    nextPlayer();
}function endTurn(){if(game.mode==='single'||game.mode==='pve'){const next=getNext(game.currentPlayer);if(next<=game.currentPlayer){enemyTurn()}else{startTurn(next)}}else{nextPlayer()}}function nextPlayer(){const next=getNext(game.currentPlayer);if(next===-1){checkWin();return}startTurn(next)}function getNext(cur){for(let i=1;i<=game.players.length;i++){const idx=(cur+i)%game.players.length;if(!game.players[idx].dead)return idx}return-1}
        function enemyTurn(){if(game.gameOver)return;log('--- '+game.enemy.name+' 的回合 ---','system');if(game.enemy.stunned>0){game.enemy.stunned--;log('Boss晕眩中，跳过回合','system');setTimeout(()=>startTurn(0),1500);return}if(game.enemy.poison>0){game.enemy.hp-=5;game.enemy.poison--;log('Boss中毒 -5','system')}if(game.enemy.hp<=0){win();return}game.enemy.nextAttack--;if(game.enemy.nextAttack<=0){const alive=game.players.filter(p=>!p.dead);const t=alive[Math.floor(Math.random()*alive.length)];const dmg=Math.floor(game.enemy.atkMin+Math.random()*(game.enemy.atkMax-game.enemy.atkMin));if(Math.random()<0.3&&alive.length>1){const aoe=Math.floor(dmg*0.7);alive.forEach(p=>{damagePlayer(p.id,aoe);showFloat('-'+aoe,p.id)});log('💥 Boss全体攻击！每人 '+aoe,'system')}else{damagePlayer(t.id,dmg);showFloat('-'+dmg,t.id);log('💥 Boss对 '+t.name+' 造成 '+dmg,'system')}game.enemy.nextAttack=2}else{log('Boss蓄力中...','system')}if(game.players.filter(p=>!p.dead).length===0){lose();return}setTimeout(()=>{game.round++;document.getElementById('roundNum').textContent=game.round;startTurn(0)},2000)}
        function checkWin(){if(game.mode==='single'||game.mode==='pve'){if(game.enemy.hp<=0)win()}else{const t0=game.players.filter(p=>p.team===0&&!p.dead).length;const t1=game.players.filter(p=>p.team===1&&!p.dead).length;if(t0===0)over(1);else if(t1===0)over(0)}}function win(){game.gameOver=true;showOver('🏆 胜利!','#2ecc71')}function lose(){game.gameOver=true;showOver('💀 失败','#e74c3c')}function over(wt){game.gameOver=true;const myTeam=game.players[game.myPlayerId].team;showOver(myTeam===wt?'🏆 胜利!':'💀 失败',myTeam===wt?'#2ecc71':'#e74c3c')}function showOver(t,c){document.getElementById('gameOverModal').style.display='flex';document.getElementById('resultTitle').textContent=t;document.getElementById('resultTitle').style.color=c;document.getElementById('resultStats').innerHTML='<div style="display:flex;justify-content:space-between;margin:10px 0"><span>回合:</span><span>'+game.round+'</span></div><div style="display:flex;justify-content:space-between;margin:10px 0"><span>存活:</span><span>'+game.players.filter(p=>!p.dead).length+'/'+game.playerCount+'</span></div>'}function updateEnemy(){if(!game.enemy)return;const p=(game.enemy.hp/game.enemy.maxHp)*100;document.querySelector('#teamBPlayers .mini-hp-fill')&&(document.querySelector('#teamBPlayers .mini-hp-fill').style.width=p+'%')}
    
function log(m, t='system') {
    const logDiv = document.getElementById('combatLog');
    const entry = document.createElement('div');
    entry.style.cssText = 'padding:8px 12px;margin:5px 0;border-radius:8px;background:rgba(149,165,166,0.15);border-left:3px solid ' + (t==='system'?'#95a5a6':'#f39c12');
    entry.textContent = m;
    logDiv.appendChild(entry);
    logDiv.scrollTop = logDiv.scrollHeight;
}

function initEnemy() {
    // 难度随人数指数增长：1人×1.0, 2人×1.8, 3人×2.7, 4人×3.6
    const scaling = 1 + (game.playerCount - 1) * 0.8 + Math.pow(game.playerCount - 1, 2) * 0.1;
    const bosses = [
        {name: '史莱姆王', icon: '🟢', hp: 200, atkMin: 15, atkMax: 25},
        {name: '火焰恶魔', icon: '🔥', hp: 280, atkMin: 20, atkMax: 35},
        {name: '冰霜巨龙', icon: '🐉', hp: 400, atkMin: 25, atkMax: 45},
        {name: '黑暗领主', icon: '👹', hp: 600, atkMin: 35, atkMax: 60}
    ];
    const boss = bosses[Math.floor(Math.random() * bosses.length)];
    game.enemy = {
        name: boss.name,
        icon: boss.icon,
        maxHp: Math.floor(boss.hp * scaling),
        hp: Math.floor(boss.hp * scaling),
        atkMin: Math.floor(boss.atkMin * scaling),
        atkMax: Math.floor(boss.atkMax * scaling),
        nextAttack: 2,
        poison: 0,
        stunned: 0
    };
    log('遭遇 ' + game.enemy.name + '！HP: ' + game.enemy.hp + ' (难度x' + scaling.toFixed(1) + ')', 'system');
}
function startGame() {
    document.getElementById('lobbyScreen').classList.add('hidden');
    document.getElementById('gameScreen').classList.remove('hidden');

    // 初始化玩家
    game.players.forEach((p, i) => {
        p.hp = CONFIG.baseHp;
        p.maxHp = CONFIG.baseHp;
        p.hand = [];
        p.pendingDefense = 0;
        p.usedThisTurn = 0;
        p.maxUsePerTurn = CONFIG.actionsPerTurn;
        p.combo = 0;
        p.lastCardType = null;
        p.dead = false;
        p.hasRevive = false;
        p.hasDrawnThisTurn = false;
        p.team = game.mode === 'pvp' ? (i < 2 ? 0 : 1) : 0;
    });

    // 设置队伍显示
    if (game.mode === 'pvp') {
        document.getElementById('teamAName').textContent = '队伍A';
        document.getElementById('teamBName').textContent = '队伍B';
    } else {
        document.getElementById('teamAName').textContent = '冒险者';
        document.getElementById('teamBName').textContent = '敌人';
        initEnemy();
    }

    game.round = 1;
    game.gameOver = false;
    document.getElementById('roundNum').textContent = '1';

    updateTeam();
    startTurn(0);
}

function startSinglePlayer(name) {
    game.mode = 'single';
    game.playerCount = 1;
    game.myPlayerId = 0;
    game.isHost = true;
    game.players = [{
        id: 0,
        name: name,
        ready: true,
        isHost: true
    }];
    startGame();
}

function returnToLobby() {
    // 隐藏游戏结束界面
    document.getElementById('gameOverModal').style.display = 'none';

    // 隐藏游戏界面，显示大厅
    document.getElementById('gameScreen').classList.add('hidden');
    document.getElementById('lobbyScreen').classList.remove('hidden');

    // 重置房间相关显示
    document.getElementById('roomSection').classList.add('hidden');
    document.getElementById('startBtn').classList.remove('hidden');
    document.getElementById('joinSection').classList.remove('hidden');

    // 重置游戏状态
    game.players = [];
    game.enemy = null;
    game.round = 1;
    game.gameOver = false;
    game.roomCode = '';
    game.isHost = false;

    // 清空战斗日志
    document.getElementById('combatLog').innerHTML = '<div style="padding:8px 12px;margin:5px 0;border-radius:8px;background:rgba(149,165,166,0.15);border-left:3px solid #95a5a6">游戏开始！等待玩家行动...</div>';

    // 清空手牌显示
    document.getElementById('handCards').innerHTML = '<div style="width:100%;text-align:center;padding:40px;opacity:0.5">等待扫描卡片...</div>';

    log('返回大厅', 'system');
}
function createParticles(target) {
    const colors = ['#f39c12', '#e74c3c', '#f1c40f', '#fff'];
    const count = 8 + Math.floor(Math.random() * 8);

    let originX, originY;
    if (target === 'enemy') {
        originX = window.innerWidth / 2;
        originY = window.innerHeight * 0.2;
    } else {
        const el = document.getElementById('mini-' + target);
        if (el) {
            const rect = el.getBoundingClientRect();
            originX = rect.left + rect.width/2;
            originY = rect.top + rect.height/2;
        } else {
            originX = window.innerWidth / 2;
            originY = window.innerHeight / 2;
        }
    }

    for (let i = 0; i < count; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
        particle.style.left = originX + 'px';
        particle.style.top = originY + 'px';

        const angle = (Math.PI * 2 * i) / count;
        const distance = 50 + Math.random() * 100;
        particle.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
        particle.style.setProperty('--ty', Math.sin(angle) * distance + 'px');

        document.body.appendChild(particle);
        setTimeout(() => particle.remove(), 600);
    }
}

function playBossAttackEffect() {
    // Boss攻击预警（屏幕泛红）
    document.body.classList.add('boss-warning');
    setTimeout(() => document.body.classList.remove('boss-warning'), 1500);

    // 延迟后显示爪痕（模拟Boss抬手然后爪击）
    setTimeout(() => {
        const container = document.createElement('div');
        container.className = 'claw-container';

        // 三道爪痕线条
        for (let i = 0; i < 3; i++) {
            setTimeout(() => {
                const line = document.createElement('div');
                line.className = 'claw-line';
                line.style.top = (30 + i * 20) + '%';
                line.style.animationDelay = (i * 0.05) + 's';
                container.appendChild(line);
                // 线条消失后显示爪印
                setTimeout(() => {
                    const mark = document.createElement('div');
                    mark.className = 'claw-mark';
                    mark.style.left = (20 + Math.random() * 60) + '%';
                    mark.style.top = (20 + Math.random() * 60) + '%';
                    mark.style.transform = 'rotate(' + (Math.random() * 40 - 20) + 'deg)';
                    container.appendChild(mark);

                    // 爪印淡出
                    setTimeout(() => {
                        mark.style.transition = 'opacity 1s';
                        mark.style.opacity = '0';
                    }, 800);
                }, 300);
            }, i * 100);
        }

        document.body.appendChild(container);

        // 血液飞溅效果
        setTimeout(() => {
            for (let i = 0; i < 5; i++) {
                const blood = document.createElement('div');
                blood.className = 'blood-splash';
                blood.style.left = (Math.random() * 80 + 10) + '%';
                blood.style.top = (Math.random() * 80 + 10) + '%';
                blood.style.animationDelay = (i * 0.1) + 's';
                container.appendChild(blood);
            }
        }, 200);

        // 清理
        setTimeout(() => container.remove(), 2500);
    }, 500);

    // 红色闪光
    setTimeout(() => {
        const flash = document.createElement('div');
        flash.className = 'flash-effect';
        flash.style.background = '#e74c3c';
        flash.style.animation = 'flash 0.2s ease-out';
        document.body.appendChild(flash);
        setTimeout(() => flash.remove(), 200);
    }, 600);

    // 强烈屏幕震动
    setTimeout(() => {
        document.body.classList.add('screen-shake');
        setTimeout(() => document.body.classList.remove('screen-shake'), 800);
    }, 600);
}
