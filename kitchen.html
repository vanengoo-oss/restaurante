<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍳 厨房订单中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; background: #f1f5f9; }
        .order-card { animation: slideIn 0.3s ease-out; border: 2px solid transparent; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .new-order { border-color: #ef4444; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 50% { box-shadow: 0 0 0 10px rgba(239,68,68,0); } }
        .date-selector { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="p-4">
<div class="max-w-6xl mx-auto">
    <!-- 头部 -->
    <div class="date-selector rounded-2xl shadow-lg p-4 mb-6 text-white">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold mb-1">🍳 厨房订单中心</h1>
                <p class="text-sm opacity-90">实时接收中 • <span id="connStatus">连接中...</span></p>
            </div>
            <div class="flex gap-2 items-center bg-white bg-opacity-20 p-2 rounded-xl">
                <button onclick="filterDate(-1)" class="bg-white bg-opacity-30 hover:bg-opacity-50 text-white px-3 py-2 rounded-lg font-bold text-sm">← 前一天</button>
                <span id="dateDisplay" class="font-bold text-lg px-2">今天</span>
                <button onclick="filterDate(1)" class="bg-white bg-opacity-30 hover:bg-opacity-50 text-white px-3 py-2 rounded-lg font-bold text-sm">后一天 →</button>
                <button onclick="showAll()" class="bg-yellow-400 text-yellow-900 px-3 py-2 rounded-lg font-bold text-sm">显示全部</button>
            </div>
        </div>
    </div>

    <!-- 统计 -->
    <div class="grid grid-cols-4 gap-4 mb-6">
        <div class="bg-white p-4 rounded-xl shadow text-center border-l-4 border-yellow-400">
            <div class="text-2xl font-bold text-yellow-600" id="countPending">0</div>
            <div class="text-xs text-gray-500">新订单</div>
        </div>
        <div class="bg-white p-4 rounded-xl shadow text-center border-l-4 border-blue-400">
            <div class="text-2xl font-bold text-blue-600" id="countCooking">0</div>
            <div class="text-xs text-gray-500">制作中</div>
        </div>
        <div class="bg-white p-4 rounded-xl shadow text-center border-l-4 border-green-400">
            <div class="text-2xl font-bold text-green-600" id="countReady">0</div>
            <div class="text-xs text-gray-500">待取餐</div>
        </div>
        <div class="bg-white p-4 rounded-xl shadow text-center border-l-4 border-purple-400">
            <div class="text-2xl font-bold text-purple-600" id="countDone">0</div>
            <div class="text-xs text-gray-500">已完成</div>
        </div>
    </div>

    <div id="ordersList" class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
        <div class="col-span-full text-center py-12 text-gray-400 bg-white rounded-xl">
            <div class="text-4xl mb-2">📭</div>
            <p>等待订单...</p>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDlRWSAOCRX5MYsvilkMKYlwIazHEoSg4U",
    authDomain: "restaurante-tocopilla.firebaseapp.com",
    databaseURL: "https://restaurante-tocopilla-default-rtdb.firebaseio.com",
    projectId: "restaurante-tocopilla",
    storageBucket: "restaurante-tocopilla.firebasestorage.app",
    messagingSenderId: "322511272257",
    appId: "1:322511272257:web:7fe43210274eaf2fae89c0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let allOrders = []; // 存储所有订单
let currentFilterDate = null; // null=显示全部

// 获取今天日期字符串
function getTodayString() {
    const now = new Date();
    return now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
}

// 监听所有订单（不过滤日期，确保能收到）
db.ref('orders').orderByChild('timestamp').limitToLast(100).on('value', (snapshot) => {
    document.getElementById('connStatus').textContent = '已连接';
    allOrders = [];
    snapshot.forEach(child => {
        allOrders.push({ key: child.key, ...child.val() });
    });
    allOrders.reverse(); // 最新的在前
    
    // 自动判断日期（如果有date字段就用，没有就按timestamp算）
    allOrders.forEach(order => {
        if (!order.date && order.timestamp) {
            const d = new Date(order.timestamp);
            order.date = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
        }
    });
    
    renderOrders();
    updateStats();
}, (error) => {
    document.getElementById('connStatus').textContent = '连接失败: ' + error.message;
});

function filterDate(days) {
    if (!currentFilterDate) currentFilterDate = getTodayString();
    const d = new Date(currentFilterDate);
    d.setDate(d.getDate() + days);
    currentFilterDate = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    document.getElementById('dateDisplay').textContent = currentFilterDate === getTodayString() ? '今天' : currentFilterDate;
    renderOrders();
}

function showAll() {
    currentFilterDate = null;
    document.getElementById('dateDisplay').textContent = '全部';
    renderOrders();
}

function renderOrders() {
    const container = document.getElementById('ordersList');
    
    // 筛选订单
    let orders = allOrders;
    if (currentFilterDate) {
        orders = allOrders.filter(o => o.date === currentFilterDate);
    }
    
    if (orders.length === 0) {
        container.innerHTML = '<div class="col-span-full text-center py-12 text-gray-400 bg-white rounded-xl"><div class="text-4xl mb-2">📭</div><p>' + (currentFilterDate ? '该日期暂无订单' : '等待订单...') + '</p></div>';
        return;
    }
    
    container.innerHTML = orders.map(order => {
        const time = order.timestamp ? new Date(order.timestamp).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}) : '--:--';
        const isNew = order.status === 'pending';
        
        return `
            <div class="order-card bg-white rounded-xl shadow p-4 ${isNew ? 'new-order' : ''}">
                <div class="flex justify-between items-start mb-3">
                    <div>
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-2xl font-bold text-gray-800">桌${order.table || '-'}</span>
                            <span class="text-xs bg-gray-100 px-2 py-1 rounded">${time}</span>
                            ${isNew ? '<span class="bg-red-500 text-white text-xs px-2 py-1 rounded animate-pulse">NEW</span>' : ''}
                        </div>
                        <div class="space-y-1 text-sm text-gray-600">
                            ${order.items ? order.items.map(item => `
                                <div class="flex items-center gap-2">
                                    <span>${item.emoji || '🍽️'}</span>
                                    <span>${item.name} x${item.qty}</span>
                                </div>
                            `).join('') : ''}
                        </div>
                        ${order.note ? `<div class="mt-2 text-xs bg-yellow-50 text-yellow-800 p-2 rounded">💬 ${order.note}</div>` : ''}
                    </div>
                </div>
                <div class="flex justify-between items-center pt-3 border-t border-gray-100">
                    <div class="text-xl font-bold text-red-600">$${order.total?.toLocaleString() || 0}</div>
                    <div class="flex gap-2">
                        ${order.status === 'pending' ? 
                            `<button onclick="setStatus('${order.key}', 'cooking')" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-sm">开始制作</button>` :
                         order.status === 'cooking' ? 
                            `<button onclick="setStatus('${order.key}', 'ready')" class="bg-green-600 text-white px-4 py-2 rounded-lg font-bold text-sm">制作完成</button>` :
                         order.status === 'ready' ? 
                            `<button onclick="setStatus('${order.key}', 'done')" class="bg-gray-600 text-white px-4 py-2 rounded-lg font-bold text-sm">已取餐</button>` :
                            `<div class="text-gray-400 text-sm">已完成</div>`
                        }
                        <button onclick="deleteOrder('${order.key}')" class="bg-red-100 text-red-600 px-3 py-2 rounded-lg text-sm">删除</button>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

function updateStats() {
    let orders = allOrders;
    if (currentFilterDate) orders = allOrders.filter(o => o.date === currentFilterDate);
    
    document.getElementById('countPending').textContent = orders.filter(o => o.status === 'pending').length;
    document.getElementById('countCooking').textContent = orders.filter(o => o.status === 'cooking').length;
    document.getElementById('countReady').textContent = orders.filter(o => o.status === 'ready').length;
    document.getElementById('countDone').textContent = orders.filter(o => o.status === 'done').length;
}

function setStatus(key, status) {
    db.ref(`orders/${key}/status`).set(status);
}

function deleteOrder(key) {
    if (confirm('确定删除？')) db.ref(`orders/${key}`).remove();
}

// 初始化显示今天
filterDate(0);
</script>
</body>
</html>
