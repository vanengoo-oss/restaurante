<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>厨房订单</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .order-card { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .btn-big { min-height: 48px; touch-action: manipulation; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-100">
    <!-- 顶部状态栏 -->
    <header class="bg-blue-600 text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="flex justify-between items-center">
            <h1 class="text-lg font-bold">🍳 厨房中心</h1>
            <span class="text-xs bg-blue-800 px-3 py-1 rounded-full" id="currentDate"></span>
        </div>
        <!-- 横向滚动状态栏 -->
        <div class="flex gap-2 mt-3 overflow-x-auto hide-scrollbar pb-1">
            <div class="bg-yellow-500 text-white px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap flex items-center gap-2">
                ⏳ 待制作 <span id="count-pending" class="bg-white text-yellow-600 rounded-full w-6 h-6 flex items-center justify-center text-xs">0</span>
            </div>
            <div class="bg-blue-500 text-white px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap flex items-center gap-2">
                🔥 制作中 <span id="count-cooking" class="bg-white text-blue-600 rounded-full w-6 h-6 flex items-center justify-center text-xs">0</span>
            </div>
            <div class="bg-green-500 text-white px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap flex items-center gap-2">
                ✅ 待取餐 <span id="count-ready" class="bg-white text-green-600 rounded-full w-6 h-6 flex items-center justify-center text-xs">0</span>
            </div>
        </div>
    </header>

    <!-- 订单列表（垂直滚动） -->
    <div class="p-3 space-y-3 pb-20" id="ordersContainer">
        <div class="text-center text-gray-400 py-8">加载中...</div>
    </div>

    <script>
        function formatCLP(amount) {
            if (!amount) return '0';
            return Math.round(parseFloat(amount)).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        const firebaseConfig = { databaseURL: "https://restaurante-tocopilla-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function getChileDate() {
            const now = new Date();
            const chileTime = new Date(now.toLocaleString("en-US", {timeZone: "America/Santiago"}));
            return `${chileTime.getFullYear()}-${String(chileTime.getMonth()+1).padStart(2,'0')}-${String(chileTime.getDate()).padStart(2,'0')}`;
        }
        
        const today = getChileDate();
        document.getElementById('currentDate').textContent = today;

        function listenOrders() {
            db.ref('orders').on('value', (snapshot) => {
                const allOrders = snapshot.val() || {};
                const todayOrders = {};
                Object.keys(allOrders).forEach(id => {
                    if (allOrders[id].date === today && allOrders[id].status !== 'done') {
                        todayOrders[id] = allOrders[id];
                        todayOrders[id].id = id;
                    }
                });
                renderOrders(todayOrders);
            });
        }

        function renderOrders(orders) {
            const container = document.getElementById('ordersContainer');
            const pending = [], cooking = [], ready = [];
            
            Object.values(orders).forEach(order => {
                if (order.status === 'ready') ready.push(order);
                else if (order.status === 'cooking') cooking.push(order);
                else pending.push(order);
            });

            document.getElementById('count-pending').textContent = pending.length;
            document.getElementById('count-cooking').textContent = cooking.length;
            document.getElementById('count-ready').textContent = ready.length;

            const allOrders = [...pending, ...cooking, ...ready];
            
            if (allOrders.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-12 text-lg">今日暂无订单</div>';
                return;
            }

            container.innerHTML = allOrders.map(order => {
                const isPending = order.status === 'pending';
                const isCooking = order.status === 'cooking';
                const statusColor = isPending ? 'border-l-yellow-400 bg-yellow-50' : isCooking ? 'border-l-blue-400 bg-blue-50' : 'border-l-green-400 bg-green-50';
                const btnColor = isPending ? 'bg-yellow-500 active:bg-yellow-600' : isCooking ? 'bg-blue-500 active:bg-blue-600' : 'bg-green-500 active:bg-green-600';
                const btnText = isPending ? '开始制作 →' : isCooking ? '制作完成 →' : '出餐 ✓';
                const nextStatus = isPending ? 'cooking' : isCooking ? 'ready' : 'done';

                return `
                <div class="order-card bg-white rounded-xl shadow-md border-l-8 ${statusColor} p-4">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <span class="text-2xl font-bold text-gray-800">#${order.id.slice(-4)}</span>
                            <span class="ml-2 text-xs px-2 py-1 rounded-full ${isPending ? 'bg-yellow-200 text-yellow-800' : isCooking ? 'bg-blue-200 text-blue-800' : 'bg-green-200 text-green-800'} font-bold">
                                ${isPending ? '待制作' : isCooking ? '制作中' : '待取餐'}
                            </span>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-bold text-green-600">${formatCLP(order.total)}</div>
                            <div class="text-xs text-gray-400">${new Date(order.timestamp).toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'})}</div>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-lg p-3 mb-3 space-y-2">
                        ${(order.items || []).map(item => `
                            <div class="flex justify-between items-center border-b border-gray-100 py-2 last:border-0">
                                <div class="flex items-center gap-2">
                                    <span class="bg-gray-200 w-6 h-6 rounded-full flex items-center justify-center text-sm font-bold">${item.quantity}</span>
                                    <span class="font-medium text-gray-800">${item.name}</span>
                                </div>
                                <span class="text-gray-600 font-mono">${formatCLP(item.price * item.quantity)}</span>
                            </div>
                        `).join('')}
                    </div>
                    
                    <button onclick="updateStatus('${order.id}', '${nextStatus}')" 
                            class="btn-big w-full ${btnColor} text-white py-4 rounded-xl font-bold text-lg shadow-lg active:scale-95 transition transform">
                        ${btnText}
                    </button>
                </div>
                `;
            }).join('');
        }

        function updateStatus(orderId, status) {
            db.ref('orders/' + orderId).update({ status, updatedAt: Date.now() });
        }

        listenOrders();
    </script>
</body>
</html>
