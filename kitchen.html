<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍳 厨房订单</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; }
        .order-card { animation: slideIn 0.3s ease-out; border: 2px solid transparent; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .new-order { border-color: #ef4444; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 50% { box-shadow: 0 0 0 10px rgba(239,68,68,0); } }
    </style>
</head>
<body class="p-4">
<div class="max-w-6xl mx-auto">
    <div class="bg-white rounded-2xl shadow p-6 mb-6">
        <h1 class="text-2xl font-bold mb-1">🍳 厨房订单中心</h1>
        <p class="text-sm text-gray-500">保持页面打开以接收订单</p>
    </div>
    
    <div class="grid grid-cols-4 gap-4 mb-6">
        <div class="bg-white p-4 rounded-xl shadow text-center border-l-4 border-yellow-400">
            <div class="text-2xl font-bold text-yellow-600" id="countPending">0</div>
            <div class="text-xs text-gray-500">新订单</div>
        </div>
        <div class="bg-white p-4 rounded-xl shadow text-center border-l-4 border-blue-400">
            <div class="text-2xl font-bold text-blue-600" id="countCooking">0</div>
            <div class="text-xs text-gray-500">制作中</div>
        </div>
        <div class="bg-white p-4 rounded-xl shadow text-center border-l-4 border-green-400">
            <div class="text-2xl font-bold text-green-600" id="countReady">0</div>
            <div class="text-xs text-gray-500">待取餐</div>
        </div>
        <div class="bg-white p-4 rounded-xl shadow text-center border-l-4 border-gray-400">
            <div class="text-2xl font-bold text-gray-600" id="countTotal">0</div>
            <div class="text-xs text-gray-500">总计</div>
        </div>
    </div>

    <div id="ordersList" class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
        <div class="col-span-full text-center py-12 text-gray-400 bg-white rounded-xl">
            <div class="text-4xl mb-2">📭</div>
            <p>等待订单...</p>
        </div>
    </div>
</div>

<script>
// ===== Firebase配置（已填好） =====
const firebaseConfig = {
    apiKey: "AIzaSyDlRWSAOCRX5MYsvilkMKYlwIazHEoSg4U",
    authDomain: "restaurante-tocopilla.firebaseapp.com",
    databaseURL: "https://restaurante-tocopilla-default-rtdb.firebaseio.com",
    projectId: "restaurante-tocopilla",
    storageBucket: "restaurante-tocopilla.firebasestorage.app",
    messagingSenderId: "322511272257",
    appId: "1:322511272257:web:7fe43210274eaf2fae89c0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

db.ref('orders').orderByChild('timestamp').limitToLast(20).on('value', (snapshot) => {
    const orders = [];
    snapshot.forEach(child => {
        orders.push({ key: child.key, ...child.val() });
    });
    orders.reverse();
    renderOrders(orders);
    updateStats(orders);
});

function renderOrders(orders) {
    const container = document.getElementById('ordersList');
    if (orders.length === 0) {
        container.innerHTML = '<div class="col-span-full text-center py-12 text-gray-400 bg-white rounded-xl"><div class="text-4xl mb-2">📭</div><p>暂无订单</p></div>';
        return;
    }
    
    container.innerHTML = orders.map(order => {
        const time = order.timestamp ? new Date(order.timestamp).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}) : '--:--';
        const isNew = order.status === 'pending';
        
        return `
            <div class="order-card bg-white rounded-xl shadow p-4 ${isNew ? 'new-order' : ''}">
                <div class="flex justify-between items-start mb-3">
                    <div>
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-2xl font-bold">桌${order.table || '-'}</span>
                            <span class="text-xs bg-gray-100 px-2 py-1 rounded">${time}</span>
                            ${isNew ? '<span class="bg-red-500 text-white text-xs px-2 py-1 rounded animate-pulse">NEW</span>' : ''}
                        </div>
                        <div class="space-y-1 text-sm">
                            ${order.items ? order.items.map(item => `
                                <div class="flex items-center gap-2">
                                    <span>${item.emoji || '🍽️'}</span>
                                    <span>${item.name} x${item.qty}</span>
                                </div>
                            `).join('') : ''}
                        </div>
                        ${order.note ? `<div class="mt-2 text-xs bg-yellow-50 text-yellow-800 p-2 rounded">💬 ${order.note}</div>` : ''}
                    </div>
                    <div class="text-right">
                        <div class="text-xl font-bold text-red-600">$${order.total?.toLocaleString() || 0}</div>
                    </div>
                </div>
                <div class="flex gap-2 pt-3 border-t">
                    ${order.status === 'pending' ? 
                        `<button onclick="setStatus('${order.key}', 'cooking')" class="flex-1 bg-blue-600 text-white py-2 rounded-lg font-bold text-sm">开始制作</button>` :
                     order.status === 'cooking' ? 
                        `<button onclick="setStatus('${order.key}', 'ready')" class="flex-1 bg-green-600 text-white py-2 rounded-lg font-bold text-sm">制作完成</button>` :
                     order.status === 'ready' ? 
                        `<button onclick="setStatus('${order.key}', 'done')" class="flex-1 bg-gray-600 text-white py-2 rounded-lg font-bold text-sm">已取餐</button>` :
                        `<div class="flex-1 text-center py-2 text-gray-400 text-sm">已完成</div>`
                    }
                    <button onclick="deleteOrder('${order.key}')" class="bg-red-100 text-red-600 px-3 rounded-lg text-sm">删除</button>
                </div>
            </div>
        `;
    }).join('');
}

function updateStats(orders) {
    document.getElementById('countPending').textContent = orders.filter(o => o.status === 'pending').length;
    document.getElementById('countCooking').textContent = orders.filter(o => o.status === 'cooking').length;
    document.getElementById('countReady').textContent = orders.filter(o => o.status === 'ready').length;
    document.getElementById('countTotal').textContent = orders.length;
}

function setStatus(key, status) {
    db.ref(`orders/${key}/status`).set(status);
}

function deleteOrder(key) {
    if (confirm('删除订单？')) {
        db.ref(`orders/${key}`).remove();
    }
}
</script>
</body>
</html>
