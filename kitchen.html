<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>厨房订单中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        .order-card { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div class="max-w-6xl mx-auto">
        <header class="bg-blue-600 text-white p-4 rounded-lg shadow mb-4">
            <h1 class="text-2xl font-bold">🍳 厨房订单中心</h1>
            <p class="text-sm mt-1">今日: <span id="currentDate"></span> | 货币: 智利比索 (CLP)</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-yellow-50 p-3 rounded border border-yellow-200">
                <h3 class="font-bold text-yellow-800 mb-2">⏳ 待制作 <span id="count-pending" class="bg-yellow-500 text-white px-2 rounded-full text-xs">0</span></h3>
                <div id="list-pending" class="space-y-2"></div>
            </div>
            <div class="bg-blue-50 p-3 rounded border border-blue-200">
                <h3 class="font-bold text-blue-800 mb-2">🔥 制作中 <span id="count-cooking" class="bg-blue-500 text-white px-2 rounded-full text-xs">0</span></h3>
                <div id="list-cooking" class="space-y-2"></div>
            </div>
            <div class="bg-green-50 p-3 rounded border border-green-200">
                <h3 class="font-bold text-green-800 mb-2">✅ 待取餐 <span id="count-ready" class="bg-green-500 text-white px-2 rounded-full text-xs">0</span></h3>
                <div id="list-ready" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <script>
        // 🔥 智利数字格式：只用点作为千位分隔符，不加 $ 符号
        // 2500 -> 2.500 | 15000 -> 15.000
        function formatCLP(amount) {
            if (!amount || isNaN(amount)) return '0';
            const num = Math.round(parseFloat(amount));
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        const firebaseConfig = {
            databaseURL: "https://restaurante-tocopilla-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function getChileDate() {
            const now = new Date();
            const chileTime = new Date(now.toLocaleString("en-US", {timeZone: "America/Santiago"}));
            return `${chileTime.getFullYear()}-${String(chileTime.getMonth()+1).padStart(2,'0')}-${String(chileTime.getDate()).padStart(2,'0')}`;
        }
        
        document.getElementById('currentDate').textContent = getChileDate();

        function listenOrders() {
            const today = getChileDate();
            db.ref('orders').on('value', (snapshot) => {
                const allOrders = snapshot.val() || {};
                const todayOrders = {};
                Object.keys(allOrders).forEach(id => {
                    if (allOrders[id].date === today && allOrders[id].status !== 'done') {
                        todayOrders[id] = allOrders[id];
                    }
                });
                renderOrders(todayOrders);
            });
        }

        function renderOrders(orders) {
            const pending = [], cooking = [], ready = [];
            
            Object.keys(orders).forEach(id => {
                const order = orders[id];
                order.id = id;
                if (order.status === 'ready') ready.push(order);
                else if (order.status === 'cooking') cooking.push(order);
                else pending.push(order);
            });

            document.getElementById('count-pending').textContent = pending.length;
            document.getElementById('count-cooking').textContent = cooking.length;
            document.getElementById('count-ready').textContent = ready.length;

            renderList('list-pending', pending, 'pending', 'bg-yellow-500 hover:bg-yellow-600');
            renderList('list-cooking', cooking, 'cooking', 'bg-blue-500 hover:bg-blue-600');
            renderList('list-ready', ready, 'ready', 'bg-green-500 hover:bg-green-600');
        }

        function renderList(containerId, orders, currentStatus, btnColor) {
            const container = document.getElementById(containerId);
            if (orders.length === 0) {
                container.innerHTML = '<div class="text-gray-400 text-center text-sm py-4">无订单</div>';
                return;
            }
            
            container.innerHTML = orders.map(order => {
                const nextText = currentStatus === 'pending' ? '开始制作 →' : 
                                currentStatus === 'cooking' ? '制作完成 →' : '已取餐 ✓';
                const nextStatus = currentStatus === 'pending' ? 'cooking' : 
                                  currentStatus === 'cooking' ? 'ready' : 'done';
                
                return `
                <div class="bg-white p-3 rounded shadow order-card border-l-4 ${currentStatus === 'pending' ? 'border-yellow-400' : currentStatus === 'cooking' ? 'border-blue-400' : 'border-green-400'}">
                    <div class="flex justify-between items-start mb-2">
                        <span class="font-bold text-gray-800 text-lg">#${order.id.slice(-6)}</span>
                        <span class="font-bold text-blue-600 text-lg">${formatCLP(order.total)}</span>
                    </div>
                    <div class="text-sm space-y-1 mb-3 bg-gray-50 p-2 rounded">
                        ${(order.items || []).map(item => {
                            const subtotal = item.price * item.quantity;
                            return `
                                <div class="flex justify-between">
                                    <span>${item.quantity}x ${item.name}</span>
                                    <span class="text-gray-600 font-mono">${formatCLP(subtotal)}</span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                    <button onclick="updateStatus('${order.id}', '${nextStatus}')" 
                            class="w-full ${btnColor} text-white py-2 rounded text-sm font-bold transition">
                        ${nextText}
                    </button>
                    <div class="text-xs text-gray-400 mt-1 text-center">
                        ${new Date(order.timestamp).toLocaleTimeString('es-CL', {hour: '2-digit', minute:'2-digit'})}
                    </div>
                </div>
                `;
            }).join('');
        }

        function updateStatus(orderId, status) {
            db.ref('orders/' + orderId).update({
                status: status,
                updatedAt: Date.now()
            });
        }

        listenOrders();
    </script>
</body>
</html>
