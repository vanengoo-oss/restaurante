<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍳 厨房订单管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; background: #f1f5f9; }
        .order-card { animation: slideIn 0.4s ease-out; transition: all 0.3s; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .new-order { animation: pulse-red 2s infinite; border: 3px solid #ef4444; }
        @keyframes pulse-red { 0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 50% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } }
        .status-btn { transition: all 0.2s; }
        .status-btn:active { transform: scale(0.95); }
        .dish-thumb { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; }
    </style>
</head>
<body class="p-4 min-h-screen">

<div class="max-w-6xl mx-auto">
    <!-- 头部 -->
    <div class="bg-white rounded-2xl shadow-sm p-6 mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
        <div>
            <h1 class="text-3xl font-bold text-gray-800 mb-1">🍳 厨房订单中心</h1>
            <p class="text-gray-500">实时接收订单中 • 保持页面打开</p>
        </div>
        <div class="flex gap-3">
            <button onclick="testSound()" class="bg-blue-100 text-blue-600 px-4 py-2 rounded-xl font-medium hover:bg-blue-200">
                🔊 测试声音
            </button>
            <button onclick="requestNotification()" class="bg-purple-100 text-purple-600 px-4 py-2 rounded-xl font-medium hover:bg-purple-200">
                🔔 开启桌面通知
            </button>
            <div class="bg-gray-100 px-4 py-2 rounded-xl text-sm text-gray-600">
                在线时长: <span id="onlineTime">00:00</span>
            </div>
        </div>
    </div>

    <!-- 统计卡片 -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <div class="bg-white p-4 rounded-2xl shadow-sm text-center border-l-4 border-yellow-400">
            <div class="text-3xl font-bold text-yellow-600" id="countPending">0</div>
            <div class="text-sm text-gray-500 mt-1">🔥 新订单</div>
        </div>
        <div class="bg-white p-4 rounded-2xl shadow-sm text-center border-l-4 border-blue-400">
            <div class="text-3xl font-bold text-blue-600" id="countCooking">0</div>
            <div class="text-sm text-gray-500 mt-1">👨‍🍳 制作中</div>
        </div>
        <div class="bg-white p-4 rounded-2xl shadow-sm text-center border-l-4 border-green-400">
            <div class="text-3xl font-bold text-green-600" id="countReady">0</div>
            <div class="text-sm text-gray-500 mt-1">✅ 待取餐</div>
        </div>
        <div class="bg-white p-4 rounded-2xl shadow-sm text-center border-l-4 border-gray-400">
            <div class="text-3xl font-bold text-gray-600" id="countTotal">0</div>
            <div class="text-sm text-gray-500 mt-1">📊 今日总计</div>
        </div>
    </div>

    <!-- 订单列表 -->
    <div id="ordersList" class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
        <div class="col-span-full text-center py-20 text-gray-400 bg-white rounded-2xl">
            <div class="text-5xl mb-3">📭</div>
            <p class="text-lg">暂无订单，等待顾客下单...</p>
            <p class="text-sm mt-2">顾客端下单后会立即显示在这里</p>
        </div>
    </div>
</div>

<script>
// ===== Firebase配置（必须与顾客端完全相同） =====
const firebaseConfig = {
    apiKey: "你的API密钥",
    authDomain: "你的项目.firebaseapp.com",
    databaseURL: "https://你的项目-default-rtdb.firebaseio.com",
    projectId: "你的项目",
    storageBucket: "你的项目.appspot.com",
    messagingSenderId: "123456",
    appId: "1:123:web:abc"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let audioCtx = null;
let startTime = Date.now();

// 计时器更新
setInterval(() => {
    const diff = Math.floor((Date.now() - startTime) / 1000);
    const mins = Math.floor(diff / 60).toString().padStart(2, '0');
    const secs = (diff % 60).toString().padStart(2, '0');
    document.getElementById('onlineTime').textContent = `${mins}:${secs}`;
}, 1000);
// 监听订单变化
db.ref('orders').orderByChild('timestamp').limitToLast(50).on('value', (snapshot) => {
    const orders = [];
    snapshot.forEach(child => {
        orders.push({ key: child.key, ...child.val() });
    });
    orders.reverse(); // 最新的在前
    
    renderOrders(orders);
    updateStats(orders);
});

function renderOrders(orders) {
    const container = document.getElementById('ordersList');
    
    if (orders.length === 0) {
        container.innerHTML = `
            <div class="col-span-full text-center py-20 text-gray-400 bg-white rounded-2xl">
                <div class="text-5xl mb-3">📭</div>
                <p class="text-lg">暂无订单，等待顾客下单...</p>
            </div>
        `;
        return;
    }
    
    container.innerHTML = orders.map(order => {
        const time = order.timestamp ? new Date(order.timestamp).toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit',second:'2-digit'}) : '--:--';
        const isNew = order.status === 'pending';
        
        return `
            <div class="order-card bg-white rounded-2xl shadow-md p-5 ${isNew ? 'new-order' : ''}">
                <div class="flex justify-between items-start mb-3">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-3xl font-bold text-gray-800">桌 ${order.table || '-'}</span>
                            <span class="text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded">${time}</span>
                            ${isNew ? '<span class="bg-red-500 text-white text-xs px-2 py-1 rounded-full animate-pulse">NEW</span>' : ''}
                        </div>
                        
                        <!-- 菜品列表（带图片） -->
                        <div class="space-y-2 mb-3">
                            ${order.items.map(item => `
                                <div class="flex items-center gap-3 text-gray-700 bg-gray-50 p-2 rounded-lg">
                                    <img src="${item.img || ''}" class="dish-thumb" onerror="this.style.display='none'" alt="">
                                    <span class="text-2xl">${item.emoji || '🍽️'}</span>
                                    <div class="flex-1">
                                        <span class="font-medium">${item.name}</span>
                                        <span class="text-gray-500 text-sm"> x${item.qty}</span>
                                    </div>
                                    <span class="text-sm text-gray-600">$${(item.price * item.qty).toLocaleString()}</span>
                                </div>
                            `).join('')}
                        </div>
                        
                        ${order.note ? `<div class="bg-yellow-50 text-yellow-800 text-sm p-2 rounded-lg mb-2 border border-yellow-200">💬 ${order.note}</div>` : ''}
                    </div>
                </div>
                
                <div class="flex justify-between items-center pt-3 border-t border-gray-100">
                    <div>
                        <div class="text-xs text-gray-500">订单号: #${String(order.id).slice(-4)}</div>
                        <div class="text-2xl font-bold text-red-600">$${order.total?.toLocaleString() || 0} CLP</div>
                    </div>
                    <div class="flex gap-2">
                        ${order.status === 'pending' ? `
                            <button onclick="setStatus('${order.key}', 'cooking')" class="status-btn bg-blue-600 text-white px-6 py-3 rounded-xl font-bold shadow-md hover:bg-blue-700">
                                👨‍🍳 开始制作
                            </button>
                        ` : order.status === 'cooking' ? `
                            <button onclick="setStatus('${order.key}', 'ready')" class="status-btn bg-green-600 text-white px-6 py-3 rounded-xl font-bold shadow-md hover:bg-green-700">
                                ✅ 制作完成
                            </button>
                        ` : order.status === 'ready' ? `
                            <button onclick="setStatus('${order.key}', 'done')" class="status-btn bg-gray-600 text-white px-6 py-3 rounded-xl font-bold shadow-md hover:bg-gray-700">
                                ✓ 已取餐
                            </button>
                        ` : `
                            <div class="px-6 py-3 text-gray-400 font-medium">已完成</div>
                        `}
                        <button onclick="deleteOrder('${order.key}')" class="bg-red-100 text-red-600 px-3 rounded-xl hover:bg-red-200" title="删除订单">
                            🗑️
                        </button>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}
function updateStats(orders) {
    const pending = orders.filter(o => o.status === 'pending').length;
    const cooking = orders.filter(o => o.status === 'cooking').length;
    const ready = orders.filter(o => o.status === 'ready').length;
    
    document.getElementById('countPending').textContent = pending;
    document.getElementById('countCooking').textContent = cooking;
    document.getElementById('countReady').textContent = ready;
    document.getElementById('countTotal').textContent = orders.length;
    
    // 新订单声音提醒
    if (pending > 0) {
        const lastOrder = orders.find(o => o.status === 'pending');
        if (lastOrder && !lastOrder.notified) {
            playBeep();
            showNotification(`桌${lastOrder.table} 新订单`, `共$${lastOrder.total}，${lastOrder.items.length}个菜品`);
            db.ref(`orders/${lastOrder.key}/notified`).set(true);
        }
    }
    
    // 标题闪烁提醒
    document.title = pending > 0 ? `🔴(${pending}) 厨房订单中心` : `🍳 厨房订单中心`;
}

function setStatus(key, status) {
    db.ref(`orders/${key}/status`).set(status);
}

function deleteOrder(key) {
    if (confirm('确定删除此订单？')) {
        db.ref(`orders/${key}`).remove();
    }
}

// ===== 声音提醒系统 =====
function playBeep() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // 播放"叮咚"声
    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();
    osc1.connect(gain1);
    gain1.connect(audioCtx.destination);
    
    osc1.frequency.value = 880;
    osc1.type = 'sine';
    gain1.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc1.start();
    osc1.stop(audioCtx.currentTime + 0.3);
    
    setTimeout(() => {
        const osc2 = audioCtx.createOscillator();
        const gain2 = audioCtx.createGain();
        osc2.connect(gain2);
        gain2.connect(audioCtx.destination);
        osc2.frequency.value = 1109;
        gain2.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc2.start();
        osc2.stop(audioCtx.currentTime + 0.3);
    }, 150);
}

function testSound() {
    playBeep();
    showNotification("测试通知", "声音和通知工作正常！");
}
// ===== 浏览器通知 =====
function requestNotification() {
    if ("Notification" in window) {
        Notification.requestPermission().then(permission => {
            if (permission === "granted") {
                alert("✅ 已开启桌面通知！有新订单时会自动弹窗提醒。");
                new Notification("通知测试", { body: "厨房通知已启用" });
            } else {
                alert("❌ 请允许通知权限");
            }
        });
    }
}

function showNotification(title, body) {
    if ("Notification" in window && Notification.permission === "granted") {
        new Notification(title, {
            body: body,
            icon: "https://cdn-icons-png.flaticon.com/512/1046/1046784.png",
            requireInteraction: true
        });
    }
}
</script>
</body>
</html>
